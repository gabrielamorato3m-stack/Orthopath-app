<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OrthoPath — Os Caminhos do Planejamento Ortodôntico</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OrthoPath">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg:#12100D;
    --bg-elevated:#1a1410;
    --card:#1e1812;
    --gold:#E0B84F;
    --gold-soft:#EAC978;
    --gold-dim:#C7A362;
    --cream:#F5F0E6;
    --cream-dim:#c9c2b3;
    --line:rgba(224,184,79,0.28);
    --danger:#b45450;
    --ok:#5f8f6b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2,h3,h4{font-family:'Playfair Display',serif;margin:0;color:var(--cream);}
  .serif-italic{font-family:'Cormorant Garamond',serif;font-style:italic;}
  a{color:var(--gold-soft);}
  #app{max-width:720px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:60px;}

  /* ---------- TOP BAR ---------- */
  .topbar{
    position:sticky;top:0;z-index:50;
    background:linear-gradient(180deg, var(--bg) 70%, rgba(18,16,13,0));
    padding:14px 18px 10px 18px;
    display:flex;align-items:center;gap:12px;
    border-bottom:1px solid transparent;
  }
  .topbar.scrolled{border-bottom:1px solid var(--line);background:var(--bg);}
  .back-btn{
    background:none;border:1px solid var(--line);color:var(--gold);
    width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .brand-mini{font-family:'Playfair Display',serif;font-size:15px;letter-spacing:0.08em;color:var(--gold);}
  .brand-mini b{color:var(--cream);}

  /* ---------- HOME ---------- */
  .hero{padding:36px 24px 20px 24px;text-align:center;}
  .hero .ring{
    width:64px;height:64px;border-radius:50%;border:1.5px solid var(--gold);
    margin:0 auto 18px auto;display:flex;align-items:center;justify-content:center;
    font-family:'Playfair Display',serif;font-weight:700;color:var(--gold);font-size:20px;
  }
  .hero .eyebrow{
    text-transform:uppercase;letter-spacing:0.16em;font-size:12.5px;color:var(--gold-dim);font-weight:600;
    margin-bottom:10px;font-weight:600;
  }
  .hero h1{font-size:28px;line-height:1.25;font-weight:700;}
  .hero p.sub{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--cream-dim);font-size:19px;margin-top:10px;}

  .menu-list{padding:8px 18px 30px 18px;display:flex;flex-direction:column;gap:12px;}
  .protocol-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px 18px;
    display:flex;align-items:center;gap:16px;
    cursor:pointer;
    transition:border-color .15s ease, transform .15s ease;
    text-align:left;
  }
  .protocol-card:active{transform:scale(0.98);}
  .protocol-card:hover{border-color:var(--gold);}
  .protocol-num{
    font-family:'Playfair Display',serif;font-size:26px;color:var(--gold);
    width:44px;flex-shrink:0;font-weight:700;opacity:0.85;
  }
  .protocol-info h3{font-size:17px;font-weight:700;margin-bottom:4px;}
  .protocol-info p{font-size:13px;color:var(--cream-dim);line-height:1.4;margin:0;}
  .protocol-arrow{margin-left:auto;color:var(--gold);font-size:18px;flex-shrink:0;}

  .home-footer{text-align:center;padding:20px 24px 40px 24px;color:var(--gold-dim);font-size:12px;letter-spacing:0.05em;font-weight:500;}

  /* ---------- WELCOME SCREEN ---------- */
  .welcome-screen{min-height:calc(100vh - 60px);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;text-align:center;}
  .welcome-screen .brand{font-family:'Playfair Display',serif;font-size:44px;font-weight:800;color:var(--gold);letter-spacing:0.01em;}
  .welcome-screen .brand-sub{font-size:13px;color:var(--cream-dim);margin-top:6px;letter-spacing:0.02em;}
  .welcome-screen .welcome-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold-soft);font-weight:700;margin-top:56px;}
  .welcome-screen .welcome-text{font-size:14.5px;color:var(--cream-dim);line-height:1.6;margin-top:16px;max-width:300px;}
  .btn-access{
    margin-top:44px;background:linear-gradient(135deg,#C4963A 0%,#E8C97A 100%);color:#1a1410;
    border:none;border-radius:12px;padding:16px 34px;font-family:'Inter',sans-serif;font-weight:700;
    font-size:15px;cursor:pointer;display:flex;align-items:center;gap:10px;
    box-shadow:0 4px 18px rgba(196,150,58,0.35);
  }

  /* ---------- BOTTOM NAV ---------- */
  .bottom-nav{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:720px;
    background:var(--bg-elevated);border-top:1px solid var(--line);
    display:flex;justify-content:space-around;padding:10px 8px calc(10px + env(safe-area-inset-bottom)) 8px;z-index:60;
  }
  .nav-item{background:none;border:none;color:var(--cream-dim);display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'Inter',sans-serif;font-size:10.5px;cursor:pointer;padding:4px 10px;}
  .nav-item .nav-ic{font-size:18px;line-height:1;}
  .nav-item.active{color:var(--gold);}

  /* ---------- PROTOCOL ICON (list avatar) ---------- */
  .protocol-icon{
    width:44px;height:44px;border-radius:10px;flex-shrink:0;
    background:rgba(224,184,79,0.12);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    font-family:'Inter',sans-serif;font-weight:700;font-size:13px;color:var(--gold);
  }
  .list-topbar{display:flex;align-items:center;justify-content:space-between;}
  .bell-btn{background:none;border:1px solid var(--line);color:var(--gold);width:36px;height:36px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .list-header{padding:20px 20px 4px 20px;}
  .list-header h1{font-size:22px;}
  .list-header p.sub{font-family:'Inter',sans-serif;font-style:normal;color:var(--cream-dim);font-size:13.5px;margin-top:4px;}

  /* ---------- PROTOCOL VIEW ---------- */
  .protocol-header{padding:6px 20px 18px 20px;}
  .protocol-header .eyebrow{color:var(--gold-dim);font-size:12.5px;text-transform:uppercase;letter-spacing:0.14em;font-weight:700;margin-bottom:6px;}
  .protocol-header h1{font-size:24px;}
  .protocol-header p.sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--cream-dim);margin-top:6px;}

  .tabs{
    display:flex;gap:0;margin:0 20px 18px 20px;
    border:1px solid var(--line);border-radius:10px;overflow:hidden;
  }
  .tab-btn{
    flex:1;padding:12px 8px;background:transparent;border:none;color:var(--cream-dim);
    font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer;
    border-right:1px solid var(--line);
  }
  .tab-btn:last-child{border-right:none;}
  .tab-btn.active{background:var(--gold);color:#1a1410;}

  .content-view, .ficha-view{padding:0 20px 40px 20px;}

  /* accordion content */
  .acc-item{border-bottom:1px solid var(--line);}
  .acc-head{
    padding:16px 4px;display:flex;justify-content:space-between;align-items:center;
    cursor:pointer;gap:12px;
  }
  .acc-head h3{font-size:16px;line-height:1.35;}
  .acc-head .chev{color:var(--gold);font-size:14px;transition:transform .2s ease;flex-shrink:0;}
  .acc-item.open .chev{transform:rotate(180deg);}
  .acc-body{max-height:0;overflow:hidden;transition:max-height .25s ease;}
  .acc-item.open .acc-body{max-height:none;}
  .acc-body-inner{padding:0 4px 18px 4px;font-size:14.5px;line-height:1.65;color:var(--cream-dim);}
  .acc-body-inner p{margin:0 0 12px 0;}
  .acc-body-inner strong{color:var(--gold-soft);font-weight:600;}
  .acc-body-inner ul{padding-left:18px;margin:0 0 12px 0;}
  .acc-body-inner li{margin-bottom:6px;}

  table.data-table{width:100%;border-collapse:collapse;margin:6px 0 16px 0;font-size:13px;}
  table.data-table th{
    background:rgba(201,168,76,0.1);color:var(--gold);text-align:left;
    padding:8px 8px;font-weight:700;border-bottom:1px solid var(--line);font-size:12.5px;
    text-transform:uppercase;letter-spacing:0.03em;
  }
  table.data-table td{padding:8px 8px;border-bottom:1px solid rgba(201,168,76,0.1);color:var(--cream-dim);vertical-align:top;}
  table.data-table tr:last-child td{border-bottom:none;}

  .alert-box{
    background:rgba(180,84,80,0.1);border:1px solid rgba(180,84,80,0.35);
    border-radius:10px;padding:14px 16px;margin:14px 0;
  }
  .alert-box .alert-label{color:#d98d89;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
  .alert-box p{color:var(--cream-dim);margin:0;}

  .rule-box{
    background:rgba(201,168,76,0.08);border-left:3px solid var(--gold);
    border-radius:0 8px 8px 0;padding:14px 16px;margin:14px 0;
  }
  .rule-box .rule-label{color:var(--gold);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
  .rule-box p{color:var(--cream-dim);margin:0;}

  .trap-card{
    border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;background:rgba(255,255,255,0.015);
  }
  .trap-num{color:var(--gold);font-size:12.5px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;}
  .trap-card h4{font-size:15px;margin:4px 0 10px 0;color:var(--cream);font-family:'Inter',sans-serif;font-weight:700;}
  .trap-card .lbl{color:var(--gold-soft);font-weight:600;font-size:12px;}
  .trap-card p{font-size:13.5px;color:var(--cream-dim);margin:2px 0 10px 0;line-height:1.55;}

  .checklist-group{margin-bottom:18px;}
  .checklist-group h4{color:var(--gold);font-size:12px;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;font-weight:700;}
  .check-line{display:flex;gap:10px;padding:7px 0;font-size:14px;color:var(--cream-dim);border-bottom:1px dashed rgba(201,168,76,0.15);align-items:flex-start;}
  .check-line::before{content:"○";color:var(--gold-soft);flex-shrink:0;font-size:12px;margin-top:4px;}

  /* ---------- FICHA ---------- */
  .ficha-block{margin-bottom:26px;}
  .ficha-block-title{
    display:flex;align-items:center;gap:10px;margin-bottom:14px;
  }
  .ficha-block-num{
    width:26px;height:26px;border-radius:50%;background:var(--gold);color:#1a1410;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12.5px;flex-shrink:0;
  }
  .ficha-block-title h3{font-size:15.5px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:0.03em;}

  .field-row{margin-bottom:14px;}
  .field-row label{display:block;font-size:12.5px;color:var(--cream-dim);margin-bottom:6px;font-weight:500;}
  .field-row input[type=text], .field-row textarea{
    width:100%;background:var(--bg-elevated);border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;color:var(--cream);font-family:'Inter',sans-serif;font-size:14px;
  }
  .field-row input[type=text]:focus, .field-row textarea:focus{outline:none;border-color:var(--gold);}
  .field-row textarea{resize:vertical;min-height:56px;}

  .field-inline{display:flex;gap:10px;flex-wrap:wrap;}
  .field-inline .field-row{flex:1;min-width:110px;}

  .option-group{display:flex;flex-wrap:wrap;gap:8px;}
  .opt-pill{
    border:1px solid var(--line);border-radius:20px;padding:8px 14px;font-size:13px;
    color:var(--cream-dim);cursor:pointer;user-select:none;background:transparent;
  }
  .opt-pill.selected{background:var(--gold);border-color:var(--gold);color:#1a1410;font-weight:600;}

  .alert-check{
    display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px dashed rgba(201,168,76,0.15);cursor:pointer;
  }
  .alert-check .box{
    width:18px;height:18px;border:1.5px solid var(--gold-dim);border-radius:4px;flex-shrink:0;margin-top:1px;
    display:flex;align-items:center;justify-content:center;font-size:12px;color:#1a1410;
  }
  .alert-check.checked .box{background:var(--gold);border-color:var(--gold);}
  .alert-check span.txt{font-size:13.5px;color:var(--cream-dim);line-height:1.4;}

  table.ficha-table{width:100%;border-collapse:collapse;margin-bottom:6px;}
  table.ficha-table th{
    font-size:12px;text-transform:uppercase;letter-spacing:0.03em;color:var(--gold-dim);font-weight:600;
    text-align:left;padding:6px 4px;border-bottom:1px solid var(--line);
  }
  table.ficha-table td{padding:6px 4px;border-bottom:1px solid rgba(201,168,76,0.1);vertical-align:middle;}
  table.ficha-table td.g-name{font-size:13px;color:var(--cream-dim);}
  table.ficha-table td.g-norm{font-size:13px;color:var(--gold-soft);white-space:nowrap;font-weight:600;}
  table.ficha-table td input{
    width:100%;background:var(--bg-elevated);border:1px solid var(--line);border-radius:6px;
    padding:6px 8px;color:var(--cream);font-size:13px;font-family:'Inter',sans-serif;
  }
  table.ficha-table td input:focus{outline:none;border-color:var(--gold);}

  .ficha-toolbar{
    position:sticky;bottom:0;background:linear-gradient(0deg, var(--bg) 60%, rgba(18,16,13,0));
    padding:18px 0 10px 0;display:flex;gap:10px;margin-top:10px;
  }
  .btn{
    flex:1;padding:14px;border-radius:10px;border:none;font-family:'Inter',sans-serif;
    font-weight:700;font-size:14px;cursor:pointer;letter-spacing:0.02em;
  }
  .btn-primary{background:var(--gold);color:#1a1410;}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--cream-dim);}
  .save-msg{text-align:center;font-size:12px;color:var(--gold-soft);padding-top:8px;min-height:16px;}

  @media print{
    .topbar,.tabs,.ficha-toolbar,.back-btn{display:none !important;}
    body{background:#fff;color:#111;}
    #app{max-width:100%;}
    .ficha-block-title h3{color:#7a6a3a;}
    table.ficha-table td input, .field-row input, .field-row textarea{border:1px solid #999;color:#111;background:#fff;}
    .opt-pill{color:#111;border-color:#999;}
    .opt-pill.selected{background:#e8d9ad;color:#111;}
    .alert-check .box{border-color:#555;}
    .alert-check.checked .box{background:#c9a84c;}
    .content-view, .home-view{display:none !important;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================================================
   DADOS — OrthoPath: 5 Protocolos completos
   ============================================================ */
const PROTOCOLS = [];

/* Helper para reduzir repetição de tabelas de grandezas cefalométricas na ficha */
function gRow(nome, norma){ return {nome, norma}; }

/* ------------------------------------------------------------
   PROTOCOLO 01 — CLASSE II
------------------------------------------------------------ */
PROTOCOLS.push({
  id:'classe2', num:'01', nome:'Classe II',
  subtitulo:'Diagnóstico Preciso: Da Face ao Cefalograma',
  conteudo:[
    {titulo:'A Lógica do Diagnóstico em Camadas', corpo:`
      <p>O diagnóstico de Classe II não começa no cefalograma. Começa na face.</p>
      <p>Capelozza Filho propôs que a organização do diagnóstico ortodôntico de acordo com os Padrões Faciais permite abordar o tratamento das más oclusões considerando a localização da discrepância esquelética, a etiologia da má oclusão, e estabelecendo protocolos de tratamento específicos para cada Padrão em cada faixa etária — com prognósticos previsíveis.</p>
      <p>O profissional que diagnostica de dentro para fora — do cefalograma para a face — comete erros que o profissional que diagnostica de fora para dentro raramente comete.</p>
      <p>A sequência correta é sempre:</p>
      <div class="rule-box"><div class="rule-label">Sequência correta</div><p>FACE → PADRÃO FACIAL → CEFALOMETRIA → DIAGNÓSTICO → PLANO</p></div>
    `},
    {titulo:'Diagnóstico Diferencial: Classe II Dentária vs Esquelética', corpo:`
      <p>Esta é a decisão mais importante de todo o protocolo. Confundir as duas é o erro que gera os piores resultados clínicos — camuflagem em caso esquelético severo, ou indicação cirúrgica em caso puramente dentário.</p>
      <p><strong>2.1 — O que olhar antes de abrir o cefalograma</strong></p>
      <p>Na análise facial — perfil:</p>
      <table class="data-table"><tr><th>Achado Clínico</th><th>Sugere</th></tr>
      <tr><td>Perfil convexo acentuado, mento recuado</td><td>Esquelético — deficiência mandibular</td></tr>
      <tr><td>Perfil convexo leve, lábio superior protruído</td><td>Dentário — protrusão dentoalveolar superior</td></tr>
      <tr><td>Perfil relativamente equilibrado com overjet aumentado</td><td>Dentário puro</td></tr>
      <tr><td>Ausência de selamento labial passivo</td><td>Componente esquelético com deficiência mandibular</td></tr>
      <tr><td>Sulco mentolabial profundo, queixo presente</td><td>Componente dentário predominante</td></tr>
      <tr><td>Lábio inferior sob os incisivos superiores</td><td>Classe II, Divisão 1 com proclinação superior</td></tr>
      </table>
      <p>No exame intrabucal:</p>
      <table class="data-table"><tr><th>Achado Clínico</th><th>Sugere</th></tr>
      <tr><td>Overjet aumentado com IS proclinados</td><td>Dentário — compensação dentoalveolar superior</td></tr>
      <tr><td>Overjet aumentado com IS em posição normal ou retroinclinados</td><td>Esquelético — a discrepância é óssea</td></tr>
      <tr><td>Relação molar Classe II completa (cúspide inteira)</td><td>Componente esquelético mais significativo</td></tr>
      <tr><td>Relação molar Classe II de ½ cúspide</td><td>Dentário ou esquelético leve</td></tr>
      <tr><td>Incisivo inferior proclinado (IMPA &gt;97°)</td><td>Compensação dentária já instalada — limita o tratamento</td></tr>
      </table>
      <p><strong>2.2 — Confirmando na Cefalometria</strong></p>
      <div class="rule-box"><div class="rule-label">Nota importante sobre as análises</div><p>A Análise Cefalométrica Padrão USP consiste em um compêndio de grandezas cefalométricas originárias de diversas análises em norma lateral, desenvolvida no curso de Pós-graduação de Ortodontia da FOUSP (São Paulo) em 1968. Na prática clínica brasileira, ela é amplamente utilizada em conjunto com McNamara — a análise USP/Unicamp é ensinada nos cursos de especialização como ferramenta central do diagnóstico ortodôntico, integrando grandezas de Steiner e outras análises consagradas.</p></div>
      <p>Use as duas de forma complementar: a USP/Unicamp entrega as relações angulares e posicionamento dentário; a McNamara entrega os tamanhos reais das bases ósseas. Juntas, formam o diagnóstico completo.</p>
      <p><strong>Grandezas esqueléticas — Análise USP/Unicamp</strong></p>
      <p><strong>SNA</strong> — posição anteroposterior da maxila em relação à base do crânio. Norma: 82° ± 2°. Aumentado (&gt;84°): protrusão maxilar → Classe II de origem maxilar. Normal com ANB aumentado: o problema está na mandíbula. Diminuído (&lt;80°): retrusão maxilar.</p>
      <p><strong>SNB</strong> — posição anteroposterior da mandíbula em relação à base do crânio. Norma: 80° ± 2°. Diminuído (&lt;78°): retrusão mandibular → Classe II de origem mandibular. ANB aumentado com SNB reduzido — retrognatismo mandibular — é o perfil cefalométrico mais frequente na Classe II esquelética.</p>
      <p><strong>ANB</strong> — diferença entre SNA e SNB; expressa a relação entre as bases ósseas. Norma: 2° ± 2° (0° a 4°).</p>
      <table class="data-table"><tr><th>ANB</th><th>Discrepância</th><th>Conduta</th></tr>
      <tr><td>4°–6°</td><td>Leve</td><td>Compensação viável na maioria dos casos</td></tr>
      <tr><td>6°–9°</td><td>Moderada</td><td>Avaliar crescimento, padrão vertical e IMPA antes de decidir</td></tr>
      <tr><td>&gt;9°</td><td>Severa</td><td>Cirurgia ortognática em adultos; ortopedia em crescimento</td></tr>
      </table>
      <div class="alert-box"><div class="alert-label">Atenção crítica</div><p>O Wits appraisal tem vantagem sobre o ANB convencional por oferecer uma indicação mais confiável da extensão da desarmonia anteroposterior entre as bases ósseas. Use sempre os dois juntos. Um ANB elevado com Wits normal pode indicar rotação do plano oclusal, não discrepância real.</p></div>
      <p><strong>Wits Appraisal</strong> — Norma: homens -1mm / mulheres -3mm. Valores positivos e aumentados confirmam discrepância sagital real.</p>
      <p><strong>FMA</strong> (Frankfort-Mandibular Plane Angle) — padrão de crescimento vertical. Norma: 25° ± 4°.</p>
      <table class="data-table"><tr><th>FMA</th><th>Padrão</th><th>Classificação</th></tr>
      <tr><td>&lt;20°</td><td>Hipodivergente</td><td>Braquifacial</td></tr>
      <tr><td>20°–30°</td><td>Normodivergente</td><td>Mesofacial</td></tr>
      <tr><td>&gt;30°</td><td>Hiperdivergente</td><td>Dolicofacial</td></tr>
      </table>
      <p><strong>SN.GoGn</strong> — direção de crescimento mandibular. Norma: 32° ± 4°. Interprete sempre em conjunto com o FMA. Quando os dois convergem, o padrão está confirmado.</p>
      <p><strong>Grandezas esqueléticas — Análise de McNamara</strong></p>
      <p>McNamara avalia o tamanho real das bases ósseas — não apenas a relação angular entre elas. É o que a USP/Unicamp não entrega sozinha, e por isso as duas se complementam. A análise de McNamara avalia a posição da maxila e mandíbula em relação à base do crânio, a relação entre maxila e mandíbula, e a altura facial anteroinferior, diferenciando componentes esqueléticos dos dentoalveolares.</p>
      <p><strong>Ponto A → Násio Perpendicular (N-Perp)</strong> — avalia a posição anteroposterior da maxila. Na dentição mista o valor normal é 0mm. Em adultos, o ponto A deve estar 1mm adiante de N-Perp. Quando o ponto A estiver atrás de N-Perp, o valor é negativo — indicando retrusão maxilar. Valor positivo e aumentado: maxila protruída → Classe II de origem maxilar. Valor negativo: maxila retruída — atenção na Classe II, Divisão 2, onde os IS retroinclinados deslocam o ponto A artificialmente.</p>
      <p><strong>Ponto Pg → N-Perp</strong> — avalia a posição anteroposterior da mandíbula. Na dentição permanente feminina, o pogônio deve estar coincidente ou até 1mm à frente de N-Perp. Na masculina, 2mm à frente. Valor muito negativo: mandíbula retruída → Classe II de origem mandibular.</p>
      <p><strong>Co-A</strong> — Comprimento Efetivo da Maxila. Côndilo ao ponto A. Expressa o comprimento real da maxila.</p>
      <p><strong>Co-Gn</strong> — Comprimento Efetivo da Mandíbula. Côndilo ao gnátio. Expressa o comprimento real da mandíbula. O diferencial maxilomandibular de referência é: em dentadura mista, maxila 85mm e mandíbula 105–108mm, diferença de 23mm. Em adultos medianos (mulher): maxila 94mm, mandíbula 121–124mm, diferença de 27–30mm. Em adultos grandes (homem): maxila 100mm, mandíbula 130–133mm, diferença de 30–33mm. Na Classe II: mandíbula com Co-Gn pequeno = deficiência mandibular real. Maxila com Co-A grande = protrusão maxilar. Os dois alterados = caso combinado — cenário mais desafiador e mais frequente.</p>
      <p><strong>AFAI</strong> — Altura Facial Anteroinferior (ENA-Me). Confirma o padrão vertical. Aumentada = dolicofacial. Diminuída = braquifacial.</p>
      <p><strong>Grandezas dentárias — obrigatórias nas duas análises</strong></p>
      <p><strong>1-NA</strong> ângulo e distância linear — Norma: 22° / 4mm. Aumentado: IS proclinado → componente dentário da Classe II.</p>
      <p><strong>1-NB</strong> ângulo e distância linear — Norma: 25° / 4mm. Aumentado: II proclinado → compensação dentária já instalada.</p>
      <p><strong>IMPA</strong> — Incisor Mandibular Plane Angle. Norma: 90° ± 5°. Este é o dado mais estratégico para a decisão de extração inferior.</p>
      <table class="data-table"><tr><th>IMPA</th><th>Situação</th><th>Conduta</th></tr>
      <tr><td>&lt;90°</td><td>II retroinclinado</td><td>Há espaço para compensação</td></tr>
      <tr><td>90°–97°</td><td>Zona de segurança</td><td>Compensação viável com controle</td></tr>
      <tr><td>&gt;97°</td><td>II já proclinado</td><td>Risco biológico — avaliar extração inferior ou cirurgia</td></tr>
      </table>

    {titulo:'Padrão Vertical: Dolicofacial e Braquifacial', corpo:`
      <p>Este é o tópico que mais divide iniciantes. O mesmo diagnóstico de Classe II em um dolicofacial e em um braquifacial exige protocolos completamente diferentes. Confundir os dois é um dos erros mais graves na clínica.</p>
      <p><strong>3.1 — Classe II no Paciente Dolicofacial (Hiperdivergente — FMA &gt;30°, SN.GoGn &gt;36°)</strong></p>
      <p>O que caracteriza este paciente: terço inferior da face aumentado · mordida aberta anterior associada ou tendência a ela · curva de Spee pouco acentuada ou plana · ângulo goníaco aberto · altura facial anteroinferior aumentada (McNamara) · selamento labial geralmente com esforço.</p>
      <div class="alert-box"><div class="alert-label">O grande risco</div><p>Qualquer mecanismo extrusivo agrava o quadro. Extruir molares — com elásticos de Classe II convencionais, Forsus sem controle, ou distalizadores que não controlem o componente vertical — causa rotação mandibular horária, aumenta a altura facial inferior, abre ainda mais a mordida e piora o perfil.</p></div>
      <p><strong>Pode extruir molar no dolicofacial com Classe II?</strong> Não. A tração parietal (alta) do AEB tem indicação específica para os padrões dolicofaciais severos com crescimento vertical acentuado, pois corrige a mordida aberta quando a força é aplicada no segmento posterior — sem o efeito extrusivo da tração cervical.</p>
      <p><strong>Pode distalizar molar no dolicofacial?</strong> Com controle vertical rigoroso — sim, mas com ressalvas. A distalização de molares superiores com alinhadores demonstrou excelente controle da dimensão vertical, sendo opção adequada para hiperdivergentes ou com mordida aberta anterior. Distalizadores convencionais (Pendulum, Jones Jig) sem ancoragem esquelética tendem a extruir o molar durante a distalização — contraindicados neste padrão sem controle adicional.</p>
      <p><strong>Protocolo no dolicofacial — em crescimento:</strong> AEB de tração alta (parietal) — restringe a maxila vertical e sagitalmente, sem extrusão de molar · mini-implantes palatinos para intrusão de molares superiores + controle vertical — a intrusão da maxila com miniparafusos na região posterior do palato, associada a barra transpalatina, promove rotação anti-horária do plano oclusal · evitar Forsus e elásticos de Classe II sem ancoragem esquelética de controle vertical.</p>
      <p><strong>Protocolo no dolicofacial — adultos com discrepância moderada:</strong> extração de 4 pré-molares — fecha a mordida por inclinação dos incisivos (efeito extrusivo posterior relativo, favorável) e corrige o componente sagital simultaneamente · mini-implantes para ancoragem e controle vertical durante a retração · cirurgia bimaxilar nos casos severos — na Classe II esquelética hiperdivergente com mordida aberta, a preparação exige extração de 4 pré-molares para retroinclinar os incisivos, seguida de cirurgia com impactação posterior da maxila e avanço mandibular.</p>
      <div class="rule-box"><div class="rule-label">Resumo dolicofacial</div><p>Controle vertical é prioridade. Nada que extruia o molar. Tração alta, intrusão esquelética ou extração de pré-molares são os caminhos seguros.</p></div>
      <p><strong>3.2 — Classe II no Paciente Braquifacial (Hipodivergente — FMA &lt;20°, SN.GoGn &lt;28°)</strong></p>
      <p>O que caracteriza este paciente: terço inferior da face diminuído · mordida profunda (sobremordida aumentada) frequentemente associada · curva de Spee acentuada no arco inferior · ângulo goníaco fechado · altura facial anteroinferior diminuída (McNamara) · perfil geralmente convexo com mento presente mas recuado.</p>
      <p><strong>A boa notícia:</strong> este paciente tolera extrusão de molar muito bem. No braquifacial, extruir o molar posterior é terapêutico — abre a mordida profunda, aumenta o terço inferior (que é diminuído), e favorece a rotação mandibular horária de forma controlada e desejada.</p>
      <p><strong>Pode extruir molar no braquifacial com Classe II?</strong> Sim — e frequentemente é desejável. O AEB com tração baixa (cervical) possibilita a distalização de corpo dos molares e ao mesmo tempo promove a extrusão dos dentes posteriores, corrigindo o trespasse horizontal e aumentando o terço inferior da face.</p>
      <p><strong>Pode distalizar molar no braquifacial?</strong> Sim — com grande segurança. O componente extrusivo inerente à maioria dos distalizadores é favorável neste padrão. Pendulum, Jones Jig e AEB cervical funcionam bem e contribuem para abertura da mordida profunda simultaneamente à correção sagital.</p>
      <p><strong>Protocolo no braquifacial — em crescimento com mordida profunda associada:</strong> AEB de tração cervical (baixa) — distaliza e extrui o molar, favorável neste padrão · aparelhos funcionais com controle de mordida profunda (plano de mordida anterior, levante de mordida) · Forsus bem indicado — corretor fixo de Classe II mais utilizado entre ortodontistas norte-americanos, e no braquifacial o componente extrusivo é tolerado e frequentemente desejado.</p>
      <p><strong>Protocolo no braquifacial — adultos:</strong> distalização convencional sem necessidade de controle vertical restritivo · extração de 2 pré-molares superiores quando há apinhamento ou protrusão severa · mecânica de arco com curva reversa no inferior para nivelamento da curva de Spee durante a retração · elásticos de Classe II com segurança — o efeito extrusivo nos molares inferiores é tolerado.</p>
      <div class="rule-box"><div class="rule-label">Resumo braquifacial</div><p>Extrusão de molar é aliada, não inimiga. Aproveite o componente extrusivo dos aparelhos. A mordida profunda associada é tratada simultaneamente com mecânica extrusiva posterior.</p></div>
      <p><strong>Tabela-Resumo: Padrão Vertical × Decisão de Mecânica</strong></p>
      <table class="data-table"><tr><th>Mecânica</th><th>Dolicofacial (&gt;30°)</th><th>Mesofacial (20–30°)</th><th>Braquifacial (&lt;20°)</th></tr>
      <tr><td>Forsus</td><td>Contraindicado sem controle vertical</td><td>Indicado</td><td>Muito indicado</td></tr>
      <tr><td>Elásticos Cl II</td><td>Cuidado — controlar vertical</td><td>Indicado</td><td>Indicado</td></tr>
      <tr><td>AEB cervical (tração baixa)</td><td>Contraindicado</td><td>Moderado</td><td>Muito indicado</td></tr>
      <tr><td>AEB parietal (tração alta)</td><td>Muito indicado</td><td>Moderado</td><td>Pode fechar demais</td></tr>
      <tr><td>Distalizador convencional</td><td>Só com controle vertical</td><td>Indicado</td><td>Muito indicado</td></tr>
      <tr><td>Distalizador com mini-implante</td><td>Preferencial</td><td>Indicado</td><td>Indicado</td></tr>
      <tr><td>Extração 4 PM</td><td>Fecha mordida e corrige Cl II</td><td>Variável</td><td>Com controle de curva de Spee</td></tr>
      </table>

    {titulo:'O Raciocínio em 5 Passos', corpo:`
      <p>Este é o protocolo mental que você deve percorrer em todo caso de Classe II antes de abrir qualquer ficha de planejamento. Responda as cinco perguntas nesta ordem. Não pule nenhuma.</p>
      <p><strong>Passo 1 — Qual é o Padrão Facial?</strong></p>
      <p>Classifique pela análise morfológica de Capelozza — frontal e perfil. Padrão I com má oclusão de Classe II → o esqueleto é harmônico, a discrepância é dentária ou leve. Padrão II → há discrepância esquelética mandibular real; o perfil convexo está no osso. Isso já orienta se você está diante de um caso compensatório ou cirúrgico antes mesmo de medir o ANB.</p>
      <p><strong>Passo 2 — A Classe II é dentária, esquelética ou mista?</strong></p>
      <p>Confirme na cefalometria (USP/Unicamp + McNamara): SNA e SNB normais + incisivos proclinados → dentária. SNA alto + Co-A aumentado + ponto A anterior à N-Perp → esquelética de origem maxilar. SNB baixo + Co-Gn diminuído + ponto Pg posterior à N-Perp → esquelética de origem mandibular. Ambos alterados → combinada — o caso mais frequente e mais complexo.</p>
      <p><strong>Passo 3 — Qual é o Padrão Vertical?</strong></p>
      <p>Confirme com FMA + SN.GoGn + AFAI (McNamara): Hiperdivergente → controle vertical é prioridade; nada que extruia molar sem controle. Normodivergente → zona de conforto; maioria dos protocolos funciona. Hipodivergente → extrusão de molar é bem tolerada; mordida profunda é tratar junto. Esta resposta determina qual mecânica você pode usar e qual você não pode.</p>
      <p><strong>Passo 4 — O Incisivo Inferior Suporta Compensação?</strong></p>
      <p>Verifique o IMPA e o 1-NB: IMPA &lt;90° → há espaço biológico para compensação. IMPA 90°–97° → compensação viável com controle. IMPA &gt;97° → incisivo já no limite; compensação adicional gera risco de recessão, deiscência óssea e recidiva — pensar em extração inferior ou cirurgia. Esta resposta define se a camuflagem é biologicamente segura.</p>
      <p><strong>Passo 5 — O Paciente Está em Crescimento?</strong></p>
      <p>Avalie o CVM no cefalograma: CVM 1–2 → pré-pico, início do crescimento — ortopedia com AEB indicada para componente maxilar. CVM 3–4 → pico de crescimento — momento ideal para propulsores mandibulares (Forsus, Herbst, Twin-Block). CVM 5–6 → crescimento encerrado — ortopedia não tem efeito esquelético; compensação ou cirurgia. Esta resposta determina se o redirecionamento do crescimento ainda é possível — e qual aparelho usar no timing certo.</p>
      <div class="rule-box"><div class="rule-label">Regra final</div><p>Só depois dessas cinco perguntas respondidas você abre a ficha de planejamento.</p></div>
    `},
    {titulo:'Mecânica de Tratamento por Fase', corpo:`
      <p>Todo tratamento de Classe II passa pelas mesmas três fases em sequência. Pular ou comprimir uma delas é a causa mais comum de resultados instáveis.</p>
      <table class="data-table"><tr><th>Fase</th><th>Objetivo</th><th>Duração</th></tr>
      <tr><td>1 — Alinhamento e Nivelamento</td><td>Preparar os arcos para receber a mecânica de Cl II</td><td>4–8 meses</td></tr>
      <tr><td>2 — Correção Sagital</td><td>Corrigir a relação sagital e atingir Cl I molar e canino</td><td>4–8 meses</td></tr>
      <tr><td>3 — Finishing</td><td>Refinar oclusão, torques, intercuspidação e estética</td><td>3–6 meses</td></tr>
      </table>
      <p><strong>Fase 1 — Sequência de arcos (a progressão correta):</strong></p>
      <table class="data-table"><tr><th>Arco</th><th>Função</th><th>Critério para avançar</th></tr>
      <tr><td>NiTi redondo 0.012–0.018"</td><td>Alinhamento inicial com força leve e constante, superelástico</td><td>Dentes razoavelmente alinhados, sem dor aguda</td></tr>
      <tr><td>NiTi retangular 0.016"×0.022" ou 0.017"×0.025"</td><td>Inicia expressão de torque com nivelamento simultâneo</td><td>Arco assenta passivo, plano nivelado</td></tr>
      <tr><td>Aço redondo 0.018"–0.020"</td><td>Consolida nivelamento, permite dobras de 2ª/3ª ordem</td><td>Grandes desnivelamentos corrigidos</td></tr>
      <tr><td>Aço retangular 0.019"×0.025" ou 0.021"×0.025"</td><td>Arco de trabalho para mecânica sagital — expressa torque total</td><td>Nivelamento 100% completo, arco passivo</td></tr>
      </table>
      <div class="alert-box"><div class="alert-label">Atenção</div><p>Nunca inicie elásticos de Classe II, Forsus ou qualquer corretor sagital com arco fino (NiTi redondo ou NiTi retangular). O arco 0.019"×0.025" aço PASSIVO em ambos os arcos é pré-requisito absoluto. Iniciar antes gera inclinações dentárias indesejadas, perda de ancoragem e resultados instáveis.</p></div>
      <div class="alert-box"><div class="alert-label">Atenção</div><p>Casos com extração de pré-molares planejada: instale reforço de ancoragem desde o início da Fase 1 — BTP, Nance ou mini-implante palatino. Aguardar para instalar a ancoragem após o alinhamento frequentemente já resulta em perda mesial dos molares que compromete o espaço planejado.</p></div>
      <div class="alert-box"><div class="alert-label">Atenção</div><p>IMPA já próximo do limite (&gt;95°) na documentação inicial: use arco de forma contraída ou arco segmentado no inferior. Monitore com cefalograma intermediário a cada 6 meses. Qualquer mecânica que proclinar o incisivo inferior além do limite biológico gera recessão, deiscência óssea e recidiva irreversível.</p></div>
      <p><strong>Fase 2 — Correção Sagital — 4 protocolos:</strong></p>
      <table class="data-table"><tr><th>Protocolo</th><th>Indicação</th><th>Pré-requisito obrigatório</th></tr>
      <tr><td>A — Extração de 2 PM superiores</td><td>Cl II com apinhamento moderado a severo. IS superiores proclinados (1-NA &gt;26°). Perfil que suporta retração</td><td>Classificar ancoragem antes: máxima (mini-implante), moderada (BTP/Nance) ou mínima</td></tr>
      <tr><td>B — Distalização sem extração</td><td>Cl II dentária ou esquelética leve. Ausência de 3os molares superiores. Apinhamento ausente ou mínimo</td><td>Remoção prévia dos 3os molares superiores — obrigatório antes de iniciar a distalização</td></tr>
      <tr><td>C — Propulsores mandibulares (Forsus, Herbst, Twin-Block)</td><td>Cl II esquelética por deficiência mandibular. Paciente em crescimento ativo (CVM 3–4). SNB baixo + Co-Gn diminuído</td><td>Arco 0.019"×0.025" aço PASSIVO em AMBOS os arcos. Monitorar IMPA a cada 6 meses</td></tr>
      <tr><td>D — Elásticos de Classe II</td><td>Cl II leve a moderada. Qualquer faixa etária como mecânica única ou complementar a outros protocolos</td><td>Arco superior 0.019"×0.025" aço rígido. Monitorar IMPA a cada 6 meses. Cooperação do paciente — protocolo dependente de uso</td></tr>
      </table>
      <p><strong>Monitoramento durante a correção sagital — obrigatório em toda consulta:</strong> medir espaço residual bilateral com régua periodontal — anotar em cada consulta · controlar IMPA com cefalograma intermediário a cada 6 meses de uso de elásticos ou Forsus · periapical dos IS superiores e inferiores a cada 6 meses durante a retração · confirmar que molar não mesializou comparando fotografias intraorais com as anteriores · relação molar e canina: conferir bilateralmente em toda consulta · só avançar para Fase 3 com Classe I de molar E canino bilateralmente confirmada.</p>
      <p><strong>Fase 3 — Finishing e Detalhamento</strong></p>
      <p>O finishing não começa quando o ortodontista decide que o caso está bom. Começa quando todos os pré-requisitos abaixo estão atingidos. Entrar no finishing sem esses critérios é a causa mais frequente de retrabalho e contenções compensatórias.</p>
      <p><strong>Pré-requisitos para entrada no finishing — TODOS obrigatórios:</strong> relação molar Classe I bilateral — direito e esquerdo confirmados · relação canina Classe I bilateral — direito e esquerdo confirmados · overjet corrigido: 1–3mm · overbite dentro do ideal: 1–3mm · espaços de extração completamente fechados — sem black spaces · linhas médias superior e inferior coincidentes com a linha média facial · ausência de contatos prematuros em Relação Cêntrica (RC) · curva de Spee nivelada ou levemente acentuada no arco inferior.</p>
      <p><strong>As 6 Chaves de Andrews — Referencial do Finishing</strong></p>
      <p>Andrews descreveu as 6 chaves da oclusão normal a partir do estudo de 120 casos não tratados com oclusão excelente. São o padrão de referência para o finishing.</p>
      <table class="data-table"><tr><th>Chave</th><th>Descrição detalhada</th></tr>
      <tr><td>1 — Relação molar</td><td>A cúspide mésio-vestibular do 1° molar superior oclui no sulco central do 1° molar inferior. A vertente distal da cúspide disto-vestibular do 1° molar superior articula com a vertente mesial da cúspide mésio-vestibular do 2° molar inferior</td></tr>
      <tr><td>2 — Angulação coroária (tip)</td><td>A porção gengival do longo eixo de cada coroa está posicionada distalmente em relação à porção oclusal/incisal. Caninos têm o maior tip (+11°). Incisivos centrais superiores: +5°. Molares: tip discreto</td></tr>
      <tr><td>3 — Inclinação coroária (torque)</td><td>IS superiores: torque vestibular positivo. IS inferiores: ligeiramente negativo. Posteriores superiores: progressivamente mais negativo do canino ao 2° molar. Posteriores inferiores: torque negativo uniforme</td></tr>
      <tr><td>4 — Rotações</td><td>Nenhum dente deve estar rodado. Molares e pré-molares rodados ocupam mais espaço no arco do que em posição correta — fonte frequente de instabilidade e recidiva pós-contenção</td></tr>
      <tr><td>5 — Contatos proximais</td><td>Todos os pontos de contato adjacentes devem estar em contato real. Black spaces (espaços negros) indicam erro de torque não corrigido ou ponto de contato inadequado</td></tr>
      <tr><td>6 — Plano oclusal</td><td>O plano oclusal deve ser levemente curvo ou plano. Curva de Wilson e curva de Spee dentro dos limites aceitáveis. Excessivamente curvo indica nivelamento incompleto</td></tr>
      </table>
      <p><strong>Protocolo de Contenção por Tipo de Caso</strong></p>
      <table class="data-table"><tr><th>Situação Clínica</th><th>Contenção Superior</th><th>Contenção Inferior</th></tr>
      <tr><td>Sem extração</td><td>Hawley ou Essix — uso integral por 1 ano, depois noturno indefinido</td><td>Fio 3×3 fixo permanente. Essix noturno se histórico severo</td></tr>
      <tr><td>Com extração 2 PM superiores</td><td>Essix uso integral ≥2 anos, depois noturno indefinido</td><td>Fio 3×3 fixo permanente</td></tr>
      <tr><td>Compensação esquelética severa (ANB &gt;6°)</td><td>Fio 3×3 fixo superior + Hawley removível noturno</td><td>Fio 3×3 fixo permanente</td></tr>
      <tr><td>Ortocirúrgico</td><td>Conforme protocolo cirúrgico — geralmente fixo superior + removível</td><td>Fio 3×3 fixo permanente</td></tr>
      </table>
      <div class="rule-box"><div class="rule-label">Regra de ouro da contenção</div><p>A contenção é INDEFINIDA. A maioria das recidivas clínicas ocorre pela interrupção precoce da contenção, não por falha da mecânica. Oriente cada paciente: "O aparelho corrigiu. A contenção mantém. Você vai usar enquanto quiser manter o resultado."</p></div>

    {titulo:'Perder Ancoragem Durante a Retração Sem Perceber', acontece:'Na documentação intermediária, os molares mesializaram 4 a 5mm. Todo o espaço que seria usado para a retração anterior foi consumido pela movimentação mesial dos molares. O overjet não fechou. A relação molar piorou em vez de melhorar. O resultado final é uma extração que foi feita para nada.', evitar:'Classifique o grau de ancoragem necessário antes de iniciar a retração: máxima, moderada ou mínima. Instale o reforço de ancoragem adequado desde o início da Fase 1 — não espere o arco de trabalho. Meça o espaço residual bilateral com régua periodontal em toda consulta e anote. O mini-implante palatino é o padrão-ouro para ancoragem máxima em casos de extração com grande retração anterior.'},

PROTOCOLS.push({
  id:'classe3', num:'02', nome:'Classe III',
  subtitulo:'Como Identificar, Planejar e Executar',
  conteudo:[
    {titulo:'A Lógica da Classe III: Por Que o Diagnóstico Diferencial Salva Casos', corpo:`
      <p>A Classe III é a maloclusão com maior risco de erro diagnóstico em toda a clínica ortodôntica. A razão é simples: o aspecto visual — perfil côncavo, incisivos cruzados, mento proeminente — induz o profissional a agir antes de entender. E agir antes de entender na Classe III é o erro que compromete o prognóstico de forma definitiva.</p>
      <p>Existem três entidades completamente distintas que produzem o mesmo aspecto clínico superficial. Confundi-las não é apenas um erro diagnóstico — é prescrever o tratamento errado para o paciente errado, no momento errado.</p>
      <p><strong>As 3 categorias — e por que cada uma exige uma conduta diferente:</strong></p>
      <table class="data-table"><tr><th>Categoria</th><th>Origem</th><th>Teste em RC</th><th>Conduta</th></tr>
      <tr><td>Pseudo Classe III</td><td>Desvio funcional anterior da mandíbula por contatos prematuros. Base óssea normal</td><td>Em RC: incisivos borda a borda ou topo a topo. Perfil melhora ao manipular</td><td>Remover interferências oclusais. Acompanhar. Interceptar precocemente</td></tr>
      <tr><td>Classe III Dentária</td><td>Inclinações compensatórias dos incisivos. Esqueleto harmônico</td><td>Em RC: relação esquelética normal. Apenas os dentes criam a aparência de Cl III</td><td>Reposicionamento dentário. Compensação via inclinação dos IS</td></tr>
      <tr><td>Classe III Esquelética</td><td>Discrepância real nas bases ósseas: deficiência maxilar, excesso mandibular ou combinada</td><td>Em RC: maloclusão persiste ou piora. A relação óssea está alterada</td><td>Crescimento: ortopedia. Adulto: compensação ou descompensação cirúrgica</td></tr>
      </table>
      <div class="rule-box"><div class="rule-label">Regra clínica fundamental</div><p>Toda mordida cruzada anterior deve ser avaliada EM RELAÇÃO CÊNTRICA antes de qualquer decisão. Sem o teste em RC, não há diagnóstico confiável. O ANB do cefalograma em oclusão habitual de um paciente com desvio funcional será falsamente negativo — e o profissional tratará como esquelético o que é funcional.</p></div>
      <p><strong>O Teste em Relação Cêntrica — Passo a Passo</strong></p>
      <p>Este é o primeiro passo clínico obrigatório em qualquer caso suspeito de Classe III. Antecede o cefalograma, antecede a análise facial e antecede qualquer decisão terapêutica.</p>
      <p><strong>O que fazer:</strong> posicionar o paciente em repouso neuromuscular — solicitar que relaxe a mandíbula completamente · manipular bilateralmente a mandíbula em arco terminal, sem força, até RC · observar qual é a relação dos incisivos nessa posição · após, pedir para o paciente fechar normalmente — observar o deslize de RC para OC.</p>
      <table class="data-table"><tr><th>Achado em RC</th><th>Interpretação</th></tr>
      <tr><td>Incisivos superiores à frente dos inferiores (overjet positivo)</td><td>Pseudo Classe III — a maloclusão é funcional, o esqueleto é normal</td></tr>
      <tr><td>Incisivos borda a borda em RC</td><td>Tendência esquelética leve ou Pseudo — investigar cefalometricamente</td></tr>
      <tr><td>Incisivos inferiores à frente em RC (overjet negativo mantido)</td><td>Componente esquelético real — mandíbula está protruída ou maxila retruída</td></tr>
      <tr><td>Deslize de RC para OC maior que 2mm anterior</td><td>Forte indicativo de Pseudo — contato prematuro desviando a mandíbula</td></tr>
      </table>
      <p><strong>Análise Facial — O Que Olhar Antes de Abrir o Cefalograma</strong></p>
      <p>No perfil:</p>
      <table class="data-table"><tr><th>Achado Facial</th><th>Sugere</th></tr>
      <tr><td>Perfil côncavo acentuado, terço médio deficiente, nariz parecendo projetado</td><td>Deficiência maxilar — origem no maxilar superior</td></tr>
      <tr><td>Perfil côncavo com mento muito proeminente, terço médio razoável</td><td>Excesso mandibular — prognatismo real</td></tr>
      <tr><td>Perfil côncavo com ambas as alterações</td><td>Caso combinado — o mais frequente e o mais desafiador</td></tr>
      <tr><td>Perfil levemente côncavo, terço médio quase normal</td><td>Componente dentário ou Pseudo Classe III — investigar RC antes de concluir</td></tr>
      <tr><td>Lábio superior plano, nasolabial aberto, sulco labiomental profundo</td><td>Padrão clássico de deficiência maxilar</td></tr>
      </table>
      <p>No exame intrabucal:</p>
      <table class="data-table"><tr><th>Achado Intrabucal</th><th>Sugere</th></tr>
      <tr><td>Overjet negativo (incisivos inferiores à frente dos superiores)</td><td>Componente esquelético presente — avaliar magnitude em mm</td></tr>
      <tr><td>IS retroinclinados (1-NA diminuído) + II proclinados (IMPA aumentado)</td><td>Compensação dentária instalada — os dentes já tentaram mascarar a discrepância</td></tr>
      <tr><td>IS em posição normal + II em posição normal com overjet negativo</td><td>Discrepância puramente óssea — casos que pedem ortopedia ou cirurgia</td></tr>
      <tr><td>Relação molar Cl III bilateral completa</td><td>Componente esquelético mais significativo</td></tr>
      <tr><td>Relação molar Cl III de meia cúspide</td><td>Discrepância leve — compensação pode ser suficiente</td></tr>
      <tr><td>Mordida cruzada anterior + posterior</td><td>Forte componente de deficiência transversal maxilar — disjunção obrigatória antes da protração</td></tr>
      </table>
    `},
    {titulo:'Confirmando na Cefalometria: USP/Unicamp + McNamara', corpo:`
      <p>O cefalograma confirma o que o exame clínico já apontou. Não o contrário. Nunca abra o software de cefalometria sem antes ter feito o teste em RC e a análise facial. O cefalograma fecha o diagnóstico — não o inicia.</p>
      <p>Na Classe III, a combinação USP/Unicamp + McNamara é especialmente poderosa porque separa com precisão a origem da discrepância: maxilar, mandibular ou combinada.</p>
      <p><strong>SNA</strong> — posição anteroposterior da maxila. Norma: 82° ± 2°. Diminuído (&lt;80°): retrusão maxilar → Classe III de origem maxilar. Normal com SNB alto: o problema está na mandíbula.</p>
      <p><strong>SNB</strong> — posição anteroposterior da mandíbula. Norma: 80° ± 2°. Aumentado (&gt;82°): protrusão mandibular → Classe III de origem mandibular. SNB alto com SNA normal: prognatismo mandibular puro — pior prognóstico de compensação.</p>
      <p><strong>ANB</strong> — relação entre as bases ósseas. Norma: 2° ± 2°. Negativo (&lt;0°): Classe III esquelética confirmada.</p>
      <table class="data-table"><tr><th>ANB</th><th>Discrepância</th><th>Conduta</th></tr>
      <tr><td>0° a –2°</td><td>Leve</td><td>Compensação dental geralmente possível. Avaliar IMPA e padrão vertical</td></tr>
      <tr><td>–3° a –5°</td><td>Moderada</td><td>Compensação com limites. Em crescimento: ortopedia ainda tem papel. Adulto: avaliar caso a caso</td></tr>
      <tr><td>&lt;–6°</td><td>Severa</td><td>Compensação tem risco biológico alto. Adulto: descompensação + cirurgia é a conduta mais previsível</td></tr>
      </table>
      <div class="alert-box"><div class="alert-label">Atenção ao ANB na Classe III</div><p>O ANB negativo pode subestimar a discrepância real quando há rotação do plano oclusal. O Wits Appraisal e a análise de McNamara (ponto A→N-Perp e Pg→N-Perp) são obrigatórios para confirmar a magnitude real da discrepância anteroposterior.</p></div>
      <p><strong>Wits Appraisal</strong> — Norma: homens –1mm / mulheres –3mm. Valores negativos aumentados (ex: –8mm, –10mm): discrepância sagital severa real.</p>
      <p><strong>FMA</strong> — padrão de crescimento vertical. Norma: 25° ± 4°. Fundamental na Classe III: determina a mecânica permitida e o prognóstico do tratamento.</p>
      <table class="data-table"><tr><th>FMA</th><th>Padrão</th><th>Implicação na Classe III</th></tr>
      <tr><td>&lt;20°</td><td>Hipodivergente (Braquifacial)</td><td>Prognóstico mais favorável. Compensação tolera mais. Extrusão de molar posterior é bem tolerada</td></tr>
      <tr><td>20°–30°</td><td>Normodivergente (Mesofacial)</td><td>Zona de conforto. A maioria dos protocolos funciona</td></tr>
      <tr><td>&gt;30°</td><td>Hiperdivergente (Dolicofacial)</td><td>Pior prognóstico. Qualquer extrusão posterior agrava. Compensação é perigosa. Indicação cirúrgica precoce</td></tr>
      </table>
      <p><strong>A Análise de McNamara na Classe III:</strong> especialmente valiosa porque separa com precisão se a discrepância é por retrusão da maxila, protrusão da mandíbula ou ambas — o que o ANB sozinho não consegue fazer.</p>
      <table class="data-table"><tr><th>Grandeza McNamara</th><th>Norma</th><th>Interpretação na Classe III</th></tr>
      <tr><td>Ponto A → N-Perp</td><td>0mm misto / +1mm adulto</td><td>Negativo: maxila retruída → Cl III de origem maxilar. Se muito negativo: deficiência maxilar real — candidato à protração ou cirurgia Le Fort I</td></tr>
      <tr><td>Ponto Pg → N-Perp</td><td>0–2mm</td><td>Muito positivo (&gt;6mm): mandíbula protruída → Cl III mandibular. Combinado com ponto A negativo: caso misto — o mais difícil de compensar</td></tr>
      <tr><td>Co-A</td><td>Tabela por tamanho facial</td><td>Co-A pequeno: maxila curta real → deficiência maxilar estrutural</td></tr>
      <tr><td>Co-Gn</td><td>Tabela por tamanho facial</td><td>Co-Gn grande: mandíbula longa real → prognatismo verdadeiro</td></tr>
      <tr><td>Dif. MM (Co-Gn–Co-A)</td><td>Misto 23mm / Fem 27–30mm / Masc 30–33mm</td><td>Aumentado: mandíbula proporcionalmente maior → componente mandibular dominante. Diferencial normal com ANB negativo: pode ser rotação de plano oclusal</td></tr>
      <tr><td>AFAI (ENA-Me)</td><td>Conforme padrão</td><td>Aumentada: dolicofacial → pior prognóstico de compensação. Diminuída: braquifacial → melhor prognóstico</td></tr>
      </table>
      <p><strong>Grandezas dentárias — decisivas na Classe III:</strong> determinam se a compensação ainda é biologicamente viável ou se o incisivo já atingiu seu limite.</p>
      <p><strong>1-NA</strong> — posição do incisivo superior. Norma: 22° / 4mm. Diminuído (&lt;20°/&lt;2mm): IS retroinclinado → há espaço para compensar inclinando para vestibular. Normal ou aumentado com overjet negativo: a discrepância é óssea, não dentária.</p>
      <p><strong>1-NB</strong> — posição do incisivo inferior. Norma: 25° / 4mm. Aumentado (&gt;30°/&gt;6mm): II proclinado → compensação dentária já instalada, não há mais espaço para retroinclinar sem risco biológico. Diminuído: II retroinclinado ou em posição normal → há margem para compensar.</p>
      <p><strong>IMPA</strong> — Norma: 90° ± 5°. Na Classe III, o IMPA é o dado mais estratégico para a decisão de compensação.</p>
      <table class="data-table"><tr><th>IMPA</th><th>Situação</th><th>Conduta na Classe III</th></tr>
      <tr><td>&lt;85°</td><td>II retroinclinado</td><td>Espaço generoso para compensação. Buccal Shelf com retroinclinação do II é seguro</td></tr>
      <tr><td>85°–92°</td><td>Zona segura</td><td>Compensação viável. Monitorar a cada 6 meses com cefalograma intermediário</td></tr>
      <tr><td>93°–97°</td><td>Zona de atenção</td><td>Compensação com limite. Avaliar perfil e magnitude da discrepância antes de decidir</td></tr>
      <tr><td>&gt;97°</td><td>Limite biológico</td><td>Retroinclinar o II é biologicamente perigoso. Risco de recessão e deiscência óssea. Considerar descompensação + cirurgia</td></tr>
      </table>
      <div class="alert-box"><div class="alert-label">Atenção — IMPA na Classe III</div><p>Na Classe III, o IMPA já tende a ser alto por compensação biológica natural (o incisivo inferior proclina para reduzir o overjet negativo). Um IMPA de 92° em um caso de Classe III JÁ é limite — não é zona de conforto. Retroinclinar ainda mais gera recessão, deiscência e recidiva irreversível.</p></div>
      <p><strong>Dolicofacial com Classe III — a combinação mais desafiadora</strong> (esta é abordada em detalhe na próxima seção, junto ao padrão braquifacial).</p>
      <p><strong>3.1 — Dolicofacial com Classe III (FMA &gt;30°):</strong> terço inferior aumentado — face longa · tendência à mordida aberta anterior ou mordida aberta instalada · AFAI aumentada na McNamara · ângulo goníaco aberto · qualquer extrusão do segmento posterior agrava o quadro.</p>
      <div class="alert-box"><div class="alert-label">Risco crítico no dolicofacial com Classe III</div><p>A compensação com retroinclinação do incisivo inferior via Buccal Shelf gera uma força extrusiva no molar inferior. No dolicofacial, essa extrusão causa rotação mandibular horária — abre ainda mais a mordida, piora o perfil e desfaz qualquer ganho sagital. O resultado: a Classe III piora esteticamente mesmo quando a relação molar melhora.</p></div>
      <p><strong>Condutas seguras no dolicofacial com Classe III:</strong> em crescimento — máscara facial com vetor de tração 30° abaixo do plano oclusal (protrai a maxila sem extruir o molar); mini-implantes na região infrazigomática (IZC) para protração sem componente extrusivo molar. Em adulto — descompensação pré-cirúrgica + cirurgia bimaxilar (Le Fort I + BSSO) com impactação posterior da maxila. Evitar Buccal Shelf sem controle vertical rigoroso neste padrão.</p>
      <div class="rule-box"><div class="rule-label">Resumo dolicofacial</div><p>Controle vertical é prioridade absoluta. Nada que extruia o molar. A cirurgia é frequentemente a conduta mais honesta para o paciente dolicofacial com Classe III moderada a severa.</p></div>
      <p><strong>3.2 — Braquifacial com Classe III (FMA &lt;20°):</strong> terço inferior diminuído — face curta · mordida profunda frequentemente associada · AFAI diminuída na McNamara · ângulo goníaco fechado · melhor prognóstico de compensação dentre todos os padrões.</p>
      <div class="rule-box"><div class="rule-label">Boa notícia no braquifacial</div><p>O braquifacial tolera extrusão de molar muito bem. A retroinclinação do incisivo inferior via Buccal Shelf — que extrue o molar inferior — causa rotação mandibular horária no braquifacial de forma favorável: aumenta o terço inferior (desejado) e melhora o perfil. A janela de compensação é maior e mais segura.</p></div>
      <p><strong>Condutas no braquifacial com Classe III:</strong> em crescimento — máscara facial com protração, tolerância excelente. Em adulto — Buccal Shelf com elásticos Classe III, indicado com segurança; extração de 2 PM inferiores quando há apinhamento severo e IMPA no limite. Prognóstico de compensação mais favorável entre todos os padrões de Classe III.</p>
      <p><strong>Tabela-Resumo: Padrão Vertical × Conduta na Classe III</strong></p>

    {titulo:'Mecânica por Protocolo — Em Crescimento e Adulto', corpo:`
      <p>A mecânica da Classe III depende de três variáveis que devem estar respondidas antes de qualquer decisão: o paciente está em crescimento? A discrepância é maxilar, mandibular ou combinada? Qual é o padrão vertical? A resposta a essas três perguntas determina qual protocolo usar.</p>
      <p><strong>Protocolo A — Disjunção + Máscara Facial (Petit/Delaire)</strong></p>
      <p>O protocolo clássico e mais amplamente documentado. Indicado quando há deficiência maxilar com ou sem componente transversal. A disjunção maxilar prévia é essencial: mobiliza as suturas e potencializa os efeitos da protração — mesmo na ausência de mordida cruzada posterior.</p>
      <table class="data-table"><tr><th>Parâmetro</th><th>Dentição mista</th><th>Dentição permanente jovem</th></tr>
      <tr><td>Força por lado</td><td>400–450g</td><td>450–500g</td></tr>
      <tr><td>Horas/dia</td><td>12–14h</td><td>14–16h</td></tr>
      <tr><td>Duração</td><td>6–10 meses</td><td>8–12 meses</td></tr>
      <tr><td>Vetor de tração</td><td colspan="2">30° abaixo do plano oclusal — NUNCA horizontal</td></tr>
      <tr><td>Sobrecorreção</td><td>Overjet de +3mm no mínimo</td><td>Overjet de +2–3mm — recidiva é esperada</td></tr>
      <tr><td>CVM ideal</td><td>CVM 1–2 (pré-pico)</td><td>CVM 3 no máximo — após CVM 4 a eficácia cai</td></tr>
      </table>
      <div class="alert-box"><div class="alert-label">Erro clínico clássico — vetor de tração horizontal</div><p>A tração horizontal (0°) na máscara facial aplica a força no centro de resistência da maxila de forma ineficiente e gera extrusão do segmento posterior com rotação mandibular horária — abre a mordida e piora o perfil no dolicofacial. O vetor deve ser sempre 30° abaixo do plano oclusal.</p></div>
      <p><strong>Protocolo B — ALT-RAMEC + Mini-implantes Infrazigomáticos (IZC)</strong></p>
      <p>O protocolo atual de evidência mais robusta para protração maxilar. O ALT-RAMEC (Alternate Rapid Maxillary Expansions and Constrictions) realiza ciclos alternados de expansão e contração rápida da maxila, mobilizando as suturas circum-maxilares antes da protração — o que aumenta significativamente a resposta ortopédica. Os mini-implantes infrazigomáticos (IZC) eliminam a dependência de cooperação do paciente ao substituir a máscara facial.</p>
      <table class="data-table"><tr><th>Etapa</th><th>Descrição</th><th>Duração</th></tr>
      <tr><td>Fase 1 — ALT-RAMEC</td><td>Ciclos alternados de expansão (1 semana) e contração (1 semana). Mobiliza suturas circum-maxilares. Apertar/afrouxar 1 volta/dia</td><td>9–10 semanas (5 ciclos)</td></tr>
      <tr><td>Fase 2 — IZC</td><td>Instalação de mini-implantes na região infrazigomática (2mm distal e 3mm acima do 1° molar superior). Força de protração: 400g/lado. Elásticos conectados ao aparelho inferior (ou Buccal Shelf inferior)</td><td>6–9 meses até CVM 3–4</td></tr>
      <tr><td>Fase 3 — Aparelho fixo</td><td>Completar o nivelamento e alinhamento com arco fixo após a correção sagital. Detalhar a oclusão e preparar a contenção</td><td>12–18 meses</td></tr>
      </table>
      <div class="rule-box"><div class="rule-label">Vantagem do protocolo com IZC</div><p>A ancoragem esquelética via IZC elimina a dependência de cooperação do paciente (sem máscara extra-oral), permite força contínua 24h, tem resposta mais rápida e eficácia documentada em estudos clínicos. Estudo publicado no American Journal of Orthodontics (2019) demonstrou avanço de maxila estatisticamente superior ao protocolo com máscara facial em menos tempo de tratamento.</p></div>
      <p><strong>Protocolo C — Aparelhos Funcionais (Frankel III, Twin-Block invertido)</strong></p>
      <p>Indicados quando a discrepância é leve a moderada, com componente funcional presente e boa colaboração. Atuam predominantemente por modulação neuromuscular e reposicionamento postural da mandíbula. Eficácia documentada em crescimento ativo — CVM 1 a 3.</p>
      <table class="data-table"><tr><th>Aparelho</th><th>Indicação principal</th><th>Limitação</th></tr>
      <tr><td>Frankel III (FR-3)</td><td>Cl III leve com componente funcional. Expansão passiva da maxila. Excelente para casos com respiração oral associada</td><td>Alta dependência de cooperação. Não indicado para discrepâncias esqueléticas severas</td></tr>
      <tr><td>Twin-Block invertido</td><td>Cl III leve a moderada com desvio funcional mandibular. Reposiciona mandíbula para posterior</td><td>Efeito predominantemente dentário. Eficácia esquelética limitada</td></tr>
      <tr><td>Mentoneira</td><td>Componente mandibular isolado. Restringe o crescimento mandibular. Maior evidência em população asiática (crescimento mandibular precoce)</td><td>Efeito limitado após pico de crescimento. Recidiva frequente. Não indicado para deficiência maxilar</td></tr>
      </table>
      <p><strong>Adulto: Compensação ou Cirurgia?</strong></p>
      <p>No adulto, o crescimento encerrou. Ortopedia não tem efeito esquelético. A decisão fundamental é: a discrepância é pequena o suficiente para ser compensada dentariamente com resultado biológico seguro e estética aceitável? Ou a magnitude exige descompensação e cirurgia ortognática?</p>
      <table class="data-table"><tr><th>Critério</th><th>Compensa</th><th>Descompensa + Cirurgia</th></tr>
      <tr><td>ANB</td><td>0° a –3°</td><td>&lt;–4° (especialmente com SNA baixo e SNB alto)</td></tr>
      <tr><td>Discrepância esquelética</td><td>Leve a moderada</td><td>Moderada a severa</td></tr>
      <tr><td>IMPA inicial</td><td>&lt;93°</td><td>&gt;93°: retroinclinar ainda mais é perigoso</td></tr>
      <tr><td>Perfil final esperado</td><td>Aceitável esteticamente (paciente concorda)</td><td>Perfil comprometido — cirurgia é a única saída estética</td></tr>
      <tr><td>Padrão vertical</td><td>Braquifacial ou mesofacial</td><td>Dolicofacial com mordida aberta</td></tr>
      <tr><td>Expectativa do paciente</td><td>Oclusão funcional (estética secundária)</td><td>Resultado estético como meta — indicação cirúrgica clara</td></tr>
      </table>
      <p><strong>Protocolo D — Buccal Shelf + Elásticos Classe III (Compensação Adulto)</strong></p>
      <p>A ancoragem esquelética via mini-implante na Buccal Shelf mandibular é o protocolo padrão-ouro para compensação da Classe III em adultos. Permite retroinclinar o incisivo inferior sem perder ancoragem, com controle preciso da mecânica e monitoramento cefalométrico do IMPA.</p>
      <table class="data-table"><tr><th>Etapa</th><th>Descrição</th></tr>
      <tr><td>1 — Alinhamento e nivelamento</td><td>Arco NiTi redondo → NiTi retangular → aço retangular. Aguardar 0.019"×0.025" aço passivo em AMBOS os arcos antes de iniciar elásticos</td></tr>
      <tr><td>2 — Instalação Buccal Shelf</td><td>Mini-implantes na região da Buccal Shelf mandibular (cortical óssea lateral da mandíbula, região de 1° e 2° molar inferior). Alta estabilidade — cortical densa, sem risco radicular</td></tr>
      <tr><td>3 — Mecânica sagital</td><td>Elásticos Classe III conectados ao Buccal Shelf inferior e ao arco superior (ou IZC superior). Força: 150–250g/lado. Monitorar IMPA a cada 6 meses</td></tr>
      <tr><td>4 — Monitoramento</td><td>Cefalograma intermediário a cada 6 meses. Periapicais dos incisivos inferiores. Parar a retroinclinação quando IMPA atingir 90° ou antes se houver sinal de recessão</td></tr>
      <tr><td>5 — Finishing</td><td>Detalhar oclusão, confirmar 6 Chaves de Andrews. Contenção: fio 3×3 fixo inferior permanente</td></tr>
      </table>
      <div class="alert-box"><div class="alert-label">Limite do Buccal Shelf</div><p>O Buccal Shelf não faz milagre. Ele permite a compensação com mais segurança e controle — mas não muda o osso. Se a discrepância esquelética for severa, o resultado final será comprometido esteticamente mesmo com a oclusão correta. Informar o paciente dos limites antes de iniciar é obrigação ética.</p></div>
      <p><strong>Protocolo E — Extração de 2 PM Inferiores</strong></p>
      <p>Indicada quando há apinhamento inferior severo associado, IMPA já no limite e necessidade de retroinclinar o incisivo inferior sem Buccal Shelf. Não é uma mecânica de escolha — é uma solução de compromisso quando a anatomia não permite outro caminho.</p>
      <table class="data-table"><tr><th>Indicação</th><th>Contraindicação</th></tr>
      <tr><td>IMPA &gt;95° com apinhamento inferior severo</td><td>Perfil côncavo — retração vai piorar</td></tr>
      <tr><td>ANB entre –2° e –4° com compensação viável</td><td>Discrepância esquelética &gt;5°</td></tr>
      <tr><td>Ausência de Buccal Shelf por anatomia desfavorável</td><td>Mordida aberta associada — perde suporte posterior</td></tr>
      <tr><td>Paciente sem perfil para cirurgia</td><td>Braquifacial com IMPA normal — não faz sentido</td></tr>
      </table>
      <p><strong>Protocolo F — Descompensação Pré-cirúrgica</strong></p>
      <p>Quando a decisão é cirúrgica, o objetivo do tratamento ortodôntico pré-operatório é o oposto da compensação: descompensar os dentes, alinhá-los sobre suas bases ósseas sem inclinações compensatórias, e preparar as arcadas para o reposicionamento cirúrgico dos maxilares.</p>
      <table class="data-table"><tr><th>Fase</th><th>Objetivo</th><th>Critério de saída</th></tr>
      <tr><td>Alinhamento e nivelamento</td><td>Alinhar dentes sobre as bases. IS: proclinação progressiva. II: retroinclinação progressiva</td><td>Arcos alinhados, formas de arco compatíveis, sem interferências</td></tr>
      <tr><td>Descompensação dos incisivos</td><td>IS deve estar PROCLINADO (1-NA aumentado). II deve estar RETROINCLINADO (IMPA reduzido). Isso parece piorar o caso — e vai piorar mesmo. É o objetivo</td><td>IS e II posicionados sobre suas bases ósseas, sem compensação. Overjet negativo aumenta — é esperado e correto</td></tr>
      <tr><td>Planejamento cirúrgico conjunto</td><td>Modelo de estudo + cefalograma + predição cirúrgica (VTO). Decisão: Le Fort I (maxila) + BSSO (mandíbula) ou apenas BSSO</td><td>Cirurgião valida o posicionamento dental pré-operatório</td></tr>
      <tr><td>Finishing pós-cirúrgico</td><td>Detalhar oclusão após a cirurgia, ajustar contatos, refinar torques</td><td>6 Chaves de Andrews confirmadas + estabilidade em RC</td></tr>

      <div class="alert-box"><div class="alert-label">Atenção — descompensação</div><p>Durante a fase de descompensação, o paciente vai ficando com a mordida pior — o overjet negativo aumenta, o perfil piora. Isso é correto. Informar o paciente desde o início que o tratamento pré-cirúrgico vai piorar temporariamente a aparência antes da cirurgia é obrigação ética e evita abandono de tratamento.</p></div>

    {titulo:'O Raciocínio em 5 Passos', corpo:`
      <p>Este é o protocolo mental obrigatório antes de abrir a ficha de planejamento. Percorra os 5 passos nesta ordem, sem pular nenhum.</p>
      <p><strong>Passo 1 — Qual é o tipo? (Pseudo / Dentária / Esquelética)</strong></p>
      <p>Faça o teste em RC antes de qualquer análise cefalométrica. Em RC: overjet positivo → Pseudo Classe III — a maloclusão é funcional, não operar. Em RC: overjet negativo mantido → componente esquelético real. Deslize RC→OC &gt;2mm anterior → forte componente funcional — investigar contato prematuro. Incisivos em posição normal com overjet negativo → discrepância puramente óssea. Este é o passo mais importante de todos — separa o que é funcional do que é estrutural.</p>
      <p><strong>Passo 2 — A origem é maxilar, mandibular ou combinada?</strong></p>
      <p>Confirme com USP/Unicamp + McNamara: SNA baixo + ponto A negativo + Co-A pequeno → Cl III MAXILAR → indicação de protração. SNB alto + ponto Pg muito positivo + Co-Gn grande → Cl III MANDIBULAR → prognóstico mais difícil. Ambos alterados → COMBINADA — o caso mais comum e mais desafiador. Wits muito negativo com SNA e SNB aparentemente normais → rotação de plano oclusal — confie mais no McNamara e Wits que no ANB neste caso. A origem da discrepância determina qual aparelho usar e o que esperar do resultado.</p>
      <p><strong>Passo 3 — Qual é o padrão vertical?</strong></p>
      <p>Confirme com FMA + SN.GoGn + AFAI: Hiperdivergente (FMA &gt;30°) → qualquer extrusão posterior é perigosa — cirurgia frequentemente é a conduta mais honesta. Normodivergente → zona de conforto, maioria dos protocolos funciona. Hipodivergente (FMA &lt;20°) → compensação mais segura, Buccal Shelf bem tolerado, melhor prognóstico de todos. Esta resposta define quais mecânicas são seguras e quais colocam o caso em risco.</p>
      <p><strong>Passo 4 — O incisivo inferior suporta retroinclinação (compensação)?</strong></p>
      <p>Verifique o IMPA e o 1-NB: IMPA &lt;88° → margem biológica confortável, compensação segura. IMPA 88°–92° → compensação viável com controle cefalométrico rigoroso. IMPA 93°–97° → zona de atenção, compensação com risco aumentado. IMPA &gt;97° → LIMITE BIOLÓGICO — retroinclinar gera recessão e deiscência óssea; considerar descompensação + cirurgia. Esta resposta define se a camuflagem é biologicamente segura para aquele paciente.</p>
      <p><strong>Passo 5 — O paciente está em crescimento? Qual é o CVM?</strong></p>
      <p>Avalie o CVM no cefalograma: CVM 1–2 → pré-pico, MOMENTO IDEAL para protração maxilar (máscara facial ou IZC), máxima resposta ortopédica. CVM 3 → pico de crescimento, protração ainda possível com resposta moderada — últimas 6–8 semanas de janela ortopédica eficaz. CVM 4–6 → crescimento encerrado ou encerrando, ortopedia sem efeito esquelético — compensação ou descompensação + cirurgia. Histórico familiar de Classe III (irmãos e pais com padrão esquelético severo) indica mais cautela — a mandíbula pode crescer além do esperado na puberdade. Na Classe III, o timing é ainda mais crítico do que na Classe II.</p>
      <div class="rule-box"><div class="rule-label">Regra final</div><p>Só depois dessas cinco respostas você abre a ficha de planejamento.</p></div>
    `}

    {titulo:'A Mordida Aberta: A Maloclusão Que Mais Recidiva Quando Mal Diagnosticada', corpo:`
      <p>A mordida aberta anterior (MAA) é a ausência de contato vertical entre os incisivos superiores e inferiores em oclusão. Simples de identificar, difícil de tratar bem. A taxa de recidiva é a maior entre todas as maloclusões — e quase sempre o motivo é o mesmo: o profissional tratou o resultado sem tratar a causa.</p>
      <p>O primeiro passo obrigatório não é escolher o aparelho. É classificar a mordida aberta com precisão — porque o diagnóstico diferencial define completamente a sequência de tratamento, a mecânica escolhida e o prognóstico de estabilidade.</p>
      <p><strong>As 2 grandes categorias — e por que confundi-las é o erro principal:</strong></p>

      <tr><td>Mordida Aberta Esquelética</td><td>Crescimento vertical excessivo. Padrão facial dolicofacial</td><td>Podem estar em posição normal ou ligeiramente extruídos</td><td>Supravertidos — a chave do problema está aqui</td><td>Intrusão de molares via mini-implantes. Cirurgia nos severos</td></tr>

    {titulo:'Etiologia: A Pergunta Que Vem Antes do Aparelho', corpo:`
      <p>Não existe tratamento estável de mordida aberta sem identificação da causa. Esta regra não tem exceção. O profissional que trata sem diagnosticar a etiologia está apostando na sorte — e as apostas na mordida aberta geralmente terminam em recidiva dentro de 18 a 24 meses.</p>
      <p><strong>Fator 1 — Hábitos Parafuncionais: A Causa Mais Frequente na Dentição Mista</strong></p>
      <p>Sucção digital, chupeta e interposição lingual são os fatores etiológicos mais prevalentes na dentição mista e início da permanente. A força da sucção cria uma pressão negativa que impede a erupção dos incisivos e promove a protrusão da pré-maxila. Quando o hábito cessa antes dos 3 anos, a autocorreção é provável. Após os 5 anos, as alterações dentoalveolares tendem a se fixar.</p>
      <table class="data-table"><tr><th>Hábito</th><th>Mecanismo</th><th>Achado clínico</th><th>Janela de interceptação</th></tr>
      <tr><td>Sucção digital</td><td>Pressão negativa impede erupção anterior. Força distal nos incisivos superiores</td><td>MAA assimétrica (lado do dedo). IS proclinados. Arco superior estreito</td><td>Até 5–6 anos: autocorreção provável após cessação. Após 7: interceptar ativamente</td></tr>
      <tr><td>Chupeta</td><td>Pressão bilateral. Força uniforme nos incisivos superiores e inferiores</td><td>MAA simétrica. IS e II em protrusão. Arco superior estreito</td><td>Até 4 anos: autocorreção provável. Após 5: planejar interceptação</td></tr>
      <tr><td>Interposição lingual</td><td>Língua mantida entre os incisivos — força constante, 24 horas</td><td>MAA circular ou oval. Dentes anteriores infravertidos</td><td>Não existe janela clara — diagnóstico e terapia fonoaudiológica imediatos</td></tr>
      </table>
      <div class="alert-box"><div class="alert-label">Atenção — interposição lingual</div><p>A interposição lingual pode ser CAUSA (primária) ou CONSEQUÊNCIA (adaptativa) da mordida aberta. Distinguir as duas é essencial: se a língua se interpõe porque há espaço (adaptativa), fechar o espaço resolve. Se a língua cria o espaço (primária), fechar sem tratar a língua é garantia de recidiva. A avaliação fonoaudiológica é obrigatória antes do planejamento.</p></div>
      <p><strong>Fator 2 — Padrão de Crescimento Vertical (Esquelético)</strong></p>
      <p>O crescimento vertical excessivo é a causa da mordida aberta esquelética. O excesso de crescimento da região posterior da maxila (supraversão dos molares) causa rotação mandibular no sentido horário — o mento recua, o ângulo goníaco abre e os incisivos perdem contato. Nenhum aparelho resolve isso sem tratar o excesso vertical da região posterior.</p>
      <table class="data-table"><tr><th>Grandeza</th><th>Valor na MAA esquelética</th><th>Interpretação clínica</th></tr>

      <tr><td>AFAI (ENA-Me)</td><td>Aumentada</td><td>Excesso de altura facial anteroinferior</td></tr>
      <tr><td>SN.Plano oclusal</td><td>Aumentado</td><td>Plano oclusal inclinado — molares em supraversão</td></tr>
      <tr><td>Ângulo goníaco</td><td>&gt;130°</td><td>Mandíbula em rotação horária — padrão instável</td></tr>
      <tr><td>Extrusão dos molares no cefalograma</td><td>Acima da norma</td><td>A chave do problema esquelético está aqui</td></tr>
      </table>
      <p><strong>Fator 3 — Respiração Oral</strong></p>
      <p>A respiração oral crônica altera a postura da língua (rebaixa para o assoalho bucal), a postura da cabeça (extensão cervical) e o padrão de crescimento facial (estreitamento da maxila, rotação mandibular). Não causa diretamente a mordida aberta, mas agrava e perpetua o padrão hiperdivergente.</p>
      <p>Encaminhar para otorrinolaringologista antes de iniciar qualquer tratamento ortodôntico ativo. Adenoamígdalas hipertróficas devem ser avaliadas — a adenoidectomia pode mudar o padrão de crescimento. Terapia miofuncional oral (fonoaudiologia) é mandatória para reposicionar a língua e reabilitar a respiração nasal.</p>
      <p><strong>Fator 4 — Anquilose Dental e Outras Causas Locais</strong></p>
      <p>Anquilose de dente posterior: bloqueia a erupção do segmento — cria mordida aberta unilateral ou localizada. Diagnóstico: som metálico à percussão, ausência de espaço periodontal na radiografia. Macroglossia verdadeira: rara, mas deve ser excluída — língua volumosa demais para o espaço intraoral. Trauma dental anterior: pode impedir a erupção normal dos incisivos. Distúrbios de ATM: deslocamento de disco com redução grave pode causar mordida aberta posterior unilateral.</p>
      <div class="alert-box"><div class="alert-label">Regra prática — etiologia múltipla</div><p>A maioria dos casos de mordida aberta tem mais de uma causa. Um paciente pode ter padrão de crescimento hiperdivergente E hábito de sucção digital E respiração oral — os três fatores atuando juntos. O plano de tratamento precisa endereçar cada causa identificada, na sequência correta, ou o resultado não será estável.</p></div>
    `},
    {titulo:'A Sequência que Separa Resultado Estável de Recidiva', corpo:`
      <p>A mordida aberta anterior é a maloclusão com maior taxa de recidiva na ortodontia. A literatura reporta recidiva de 17 a 40% dos casos, dependendo do tipo e da qualidade do planejamento. O motivo quase universal: a sequência de tratamento foi invertida — o aparelho foi instalado antes que as causas fossem controladas.</p>
      <p>A sequência correta tem 4 fases obrigatórias. Pular qualquer uma compromete o resultado a longo prazo.</p>
      <table class="data-table"><tr><th>Fase</th><th>Objetivo</th><th>O que acontece sem ela</th></tr>
