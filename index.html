      <tr><td>Fase 3</td><td>Finishing e contenção ativa. Detalhar oclusão, confirmar contatos anteriores estáveis, instalar contenção específica para mordida aberta</td><td>Sem contenção adequada específica para mordida aberta, a recidiva ocorre mesmo em casos bem tratados</td></tr>
      </table>
      <p><strong>Fase 0 em detalhes — o pré-tratamento que decide o prognóstico</strong></p>
      <p>Esta fase é invisível para o paciente e determinante para o resultado. Não começa com aparelho. Começa com a eliminação de tudo que vai sabotear o tratamento antes mesmo de iniciá-lo.</p>
      <p><strong>3.1 — Hábito parafuncional: nunca instale aparelho com hábito ativo.</strong> Sucção digital após os 6 anos: terapia comportamental, grade palatina, esporão lingual — intervir ativamente antes do fixo. Chupeta: retirar progressivamente até os 3 anos, abruptamente após os 4. O hábito cessa → reavaliar após 3 a 6 meses antes de instalar o fixo — em muitos casos a autocorreção é parcial ou total em crianças.</p>
      <p><strong>3.2 — Avaliação de vias aéreas (ORL).</strong> Encaminhar para otorrinolaringologista antes de qualquer plano de tratamento. Hipertrofia de adenoides e/ou amígdalas: avaliar indicação de adenoidectomia/amigdalectomia. Desvio de septo nasal: avaliar correção cirúrgica nos adultos. Sem via aérea nasal desobstruída, a respiração oral continuará e o padrão hiperdivergente será perpetuado.</p>
      <p><strong>3.3 — Avaliação fonoaudiológica (obrigatória).</strong> Todo caso de mordida aberta anterior precisa de avaliação fonoaudiológica. A fonoaudiologia avalia: postura lingual em repouso, deglutição, fala, respiração. Terapia miofuncional oral: reposiciona a língua no palato, elimina a deglutição atípica, reabilita a selagem labial. A literatura documenta que casos tratados COM terapia fonoaudiológica têm significativamente menos recidiva do que os tratados sem ela — especialmente quando havia interposição lingual.</p>
      <div class="alert-box"><div class="alert-label">Regra de ouro do pré-tratamento</div><p>Nunca instale o aparelho fixo enquanto: (1) o hábito parafuncional estiver ativo; (2) a via aérea não tiver sido avaliada; (3) a avaliação fonoaudiológica não tiver sido realizada. Estes três passos não são opcionais — são a fundação do resultado.</p></div>

    {titulo:'Mecânica por Protocolo: Quatro Caminhos, Uma Decisão', corpo:`
      <p>A escolha do protocolo mecânico depende do diagnóstico diferencial (dentária vs esquelética), do padrão vertical, da fase de crescimento e — fundamentalmente — de se as causas foram controladas na Fase 0. Não existe protocolo certo para diagnóstico errado.</p>
      <p><strong>Visão geral — qual protocolo para qual paciente:</strong></p>
      <table class="data-table"><tr><th>Tipo</th><th>Crescimento?</th><th>Protocolo indicado</th></tr>

      <p><strong>Protocolo A — Grade Palatina + Extrusão Anterior (Em Crescimento)</strong></p>
      <p>O protocolo mais indicado para mordida aberta dentária em crescimento após o controle do hábito parafuncional. A grade palatina cumpre dois papéis: impedimento mecânico da interposição lingual E lembrete sensorial para reposicionamento lingual no palato.</p>

      </table>
      <div class="alert-box"><div class="alert-label">Cuidado com o timing da grade</div><p>A grade palatina só deve ser removida após 3 a 6 meses de overbite positivo estável — não na consulta em que o fechamento foi confirmado. Remover precocemente antes da reeducação lingual é a causa mais comum de recidiva imediata após o uso de grade.</p></div>
      <p><strong>Protocolo B — Extrusão Anterior com Elásticos Verticais (Adulto Dentário)</strong></p>
      <p>Para mordida aberta dentária no adulto após controle fonoaudiológico. A mecânica é simples — o desafio é a ancoragem. Elásticos verticais sem ancoragem adequada extruem os posteriores junto com os anteriores, piorando o padrão vertical em vez de corrigir.</p>

      </table>
      <p><strong>Protocolo C — Controle Vertical em Crescimento (Esquelética Leve/Moderada)</strong></p>
      <p>Para mordida aberta esquelética leve em paciente em crescimento. O objetivo não é fechar a mordida aberta com mecânica ativa — é controlar o crescimento vertical excessivo para que o crescimento anteroinferior normal feche o espaço.</p>

      <p>Apinhamento severo é definido por Proffit como discrepância entre o material dentário e o comprimento do arco superior a 6mm. Mas o número sozinho não determina o plano de tratamento. Dois pacientes com a mesma discrepância de 8mm podem ter planejamentos completamente opostos — um com extração, outro sem. O diagnóstico correto não mede apenas o espaço que falta: ele mapeia por que falta.</p>

      <p><strong>O Paciente Borderline — Os 3 Critérios de Desempate</strong></p>
      <p>O caso borderline (discrepância de 6 a 8mm com critérios conflitantes) é o cenário que mais exige raciocínio clínico. Quando os 6 critérios não apontam claramente para uma direção, três variáveis decidem:</p>

    {titulo:'Caminhos Sem Extração: Quatro Estratégias, Limites Claros', corpo:`
      <p>Não extrair não significa "fazer menos". Significa escolher uma estratégia alternativa que produza resultado estável dentro dos limites biológicos do paciente. Cada estratégia tem seu espaço de ganho máximo — e ultrapassar esse espaço é a origem dos resultados instáveis e das recidivas pós-tratamento.</p>
      <p><strong>Estratégia 1 — IPR: Desgaste Interproximal Controlado</strong></p>
      <p>O IPR (Interproximal Reduction) remove esmalte das faces de contato dos dentes para criar espaço sem movimentar as bases ósseas. É a estratégia mais conservadora e de menor risco quando bem indicada.</p>
      <table class="data-table"><tr><th>Parâmetro</th><th>Detalhe clínico</th></tr>
      <tr><td>Ganho máximo seguro</td><td>Até 0,5mm por face = 1mm por par de dentes. Em toda a arcada anterior (10 faces): até 5mm de ganho teórico. Na prática: 3 a 4mm é o limite seguro sem dano ao esmalte</td></tr>
      <tr><td>Indicação ideal</td><td>Apinhamento leve (1–4mm) com IMPA normal e Bolton aumentado. Especialmente útil quando a discrepância de Bolton impede o alinhamento</td></tr>
      <tr><td>Contraindicação</td><td>Cárie ativa. Dentes com restaurações extensas nas faces proximais. Biotipo periodontal com papila retraída (risco de triângulos negros)</td></tr>
      <tr><td>Sequência correta</td><td>1. Alinhamento e nivelamento com arco NiTi. 2. IPR em arco retangular, após nivelamento. 3. Nunca fazer IPR em dentes desalinhados — a medida não é confiável</td></tr>
      <tr><td>Instrumentos</td><td>Lixas interproximais (Ortho Strips) ou discos de IPR. Verificar com calibrador após cada desgaste. Aplicar flúor neutro nas faces desgastadas</td></tr>
      </table>
      <div class="alert-box"><div class="alert-label">Limite do IPR</div><p>IPR acima de 0,5mm por face gera risco de cárie, sensibilidade e perda de resistência do esmalte. O ganho de 3–4mm em toda a arcada é o teto real — não planeje o IPR esperando 6 ou 7mm de ganho. Se a discrepância exige mais do que o IPR pode oferecer: combinar com expansão ou reavaliar a extração.</p></div>
      <p><strong>Estratégia 2 — Expansão Dentoalveolar</strong></p>
      <p>A expansão dentoalveolar inclina os dentes para vestibular, ampliando o arco sem abrir a sutura palatina. É diferente da expansão esquelética. O ganho de perímetro de arco por expansão dentoalveolar é de aproximadamente 1mm de comprimento de arco para cada 3mm de largura adicionada na região de pré-molares.</p>
      <table class="data-table"><tr><th>Parâmetro</th><th>Detalhe</th></tr>
      <tr><td>Ganho por expansão</td><td>A cada 1mm de expansão transversal: +0,33mm de comprimento de arco. Expansão de 6mm → ganho de ~2mm de arco. Expansão de 9mm → ganho de ~3mm de arco</td></tr>
      <tr><td>Limite biológico</td><td>O limite da expansão dentoalveolar é o osso alveolar vestibular. Ultrapassar gera deiscência, fenestração e recessão gengival. CBCT obrigatório quando expansão &gt;5mm está sendo planejada</td></tr>
      <tr><td>Quando combinar com ERM</td><td>Se a atresia maxilar é esquelética (palato ogival, mordida cruzada posterior): ERM/MARPE antes da expansão dentoalveolar com fixo</td></tr>
      <tr><td>Biotipo fino</td><td>Biotipo periodontal fino é CONTRAINDICAÇÃO relativa à expansão. Risco de recessão mesmo dentro dos limites do osso alveolar</td></tr>
      </table>
      <p><strong>Estratégia 3 — Expansão Rápida da Maxila (ERM) em Crescimento</strong></p>
      <p>A ERM (Hyrax, Haas) abre a sutura palatina mediana e aumenta a largura esquelética da maxila. É o método mais efetivo de ganho de espaço sem extração — e tem indicação clara em pacientes em crescimento com atresia maxilar real.</p>
      <table class="data-table"><tr><th>Parâmetro</th><th>Valor / Detalhe</th></tr>
      <tr><td>Ganho de espaço</td><td>1mm de abertura da sutura → ~0,7mm de ganho no arco. Expansão de 8mm → ~5–6mm de ganho no perímetro do arco</td></tr>
      <tr><td>Ativação</td><td>¼ de volta (0,25mm) duas vezes ao dia. Período ativo: 10 a 14 dias para ganho de 5–7mm</td></tr>
      <tr><td>Contenção obrigatória</td><td>Manter o aparelho passivo por 3 a 6 meses após a expansão. A sutura precisa ossificar antes de qualquer remoção</td></tr>
      <tr><td>CVM ideal</td><td>CVM 1–3: sutura aberta, resposta máxima. CVM 4: sutura em início de fusão — resposta reduzida. CVM 5–6: sutura fusionada — ERM convencional não é eficaz</td></tr>
      <tr><td>Sobrecorreção</td><td>Expanda 2mm além do necessário (haverá recuo transversal de ~15–20%). A relação molar vai parecer mordida cruzada contrária temporariamente</td></tr>
      </table>
      <p><strong>Estratégia 4 — MARPE: Expansão com Mini-implantes para Adultos</strong></p>
      <p>O MARPE (Miniscrew-Assisted Rapid Palatal Expansion) é a evolução da ERM para pacientes após o pico de crescimento. Quatro mini-implantes palatinos transferem a força de expansão diretamente ao osso, minimizando a inclinação dentoalveolar e viabilizando a abertura da sutura em adultos jovens (fusão incompleta — estágios A e B na classificação de Angelieri).</p>
      <table class="data-table"><tr><th>Parâmetro</th><th>Detalhe clínico</th></tr>
      <tr><td>Pré-requisito absoluto</td><td>CBCT obrigatório para avaliar o estágio de fusão da sutura palatina mediana (classificação de Angelieri: A e B = MARPE indicado; C, D, E = SARPE)</td></tr>
      <tr><td>Instalação</td><td>4 mini-implantes palatinos: 2 anteriores e 2 posteriores ao parafuso expansor. Distância mínima de 3mm das raízes dos dentes adjacentes</td></tr>
      <tr><td>Ativação</td><td>¼ de volta (0,25mm) uma vez ao dia (protocolo mais conservador). Ou ½ volta ao dia nos primeiros 3 dias (protocolo acelerado)</td></tr>
      <tr><td>Vantagens sobre ERM</td><td>Menor inclinação dentoalveolar vestibular. Expansão mais esquelética e menos dentária. Menor risco de recessão gengival nos molares âncora</td></tr>
      <tr><td>Limitação</td><td>Fusão completa da sutura (estágios D–E): MARPE não é eficaz. Nesses casos: SARPE (expansão cirúrgica assistida) é a indicação</td></tr>
      </table>
      <div class="rule-box"><div class="rule-label">Regra prática — ERM vs MARPE vs SARPE</div><p>CVM 1–3 + sutura aberta no CBCT: ERM convencional (Hyrax). Adulto jovem + sutura fusão parcial (Angelieri A–B): MARPE. Adulto + sutura completamente fusionada (Angelieri C–E): SARPE (cirúrgico). Nunca instalar ERM convencional em adulto com CBCT mostrando sutura fusionada — o resultado será apenas inclinação dentária, sem ganho esquelético.</p></div>

    {titulo:'Caminhos Com Extração: Qual Dente, Qual Ancoragem, Qual Mecânica', corpo:`
      <p>Quando a extração é indicada, três decisões definem o resultado final: qual dente extrair, qual grau de ancoragem planejar e qual mecânica de fechamento usar. Cada uma dessas decisões é tomada antes de colar o primeiro braquete — não durante o tratamento.</p>
      <p><strong>Qual Dente Extrair — Hierarquia de Escolha</strong></p>
      <table class="data-table"><tr><th>Situação clínica</th><th>Dente de escolha</th><th>Justificativa</th></tr>
      <tr><td>Apinhamento severo Classe I com biprotrusão</td><td>4 PM (2 superiores + 2 inferiores)</td><td>Os PM mais próximos do apinhamento anterior. Retração simétrica de toda a bateria anterior</td></tr>
      <tr><td>Apinhamento severo Classe I sem biprotrusão, IMPA normal</td><td>2 PM superiores se apinhamento só no superior</td><td>Preservar o inferior. Avaliar Bolton antes. Extração assimétrica se Bolton indica</td></tr>
      <tr><td>Apinhamento + Classe II esquelética/dentária</td><td>2 PM superiores</td><td>O espaço da extração superior corrige a Cl II e resolve o apinhamento simultaneamente</td></tr>
      <tr><td>Apinhamento + Classe III (compensação adulto)</td><td>2 PM inferiores</td><td>Retroinclinar os II com espaço sem Buccal Shelf quando IMPA &gt;93° e biotipo desfavorável</td></tr>
      <tr><td>Dente com grande restauração, cárie ou PAP</td><td>O dente comprometido (mesmo que não seja PM)</td><td>Aproveitar a necessidade de extração terapêutica. Sempre avaliar com endodontista antes</td></tr>
      <tr><td>Canino impactado com reabsorção do lateral</td><td>Canino impactado (em último caso: 1° PM)</td><td>Remover o canino impactado quando o dano ao lateral é irreversível. Avaliar com cirurgião previamente</td></tr>
      </table>
      <p><strong>Classificação de Ancoragem — McLaughlin, Bennett e Trevisi (MBT)</strong></p>
      <p>Após definir o dente a extrair, a segunda decisão mais importante é o grau de ancoragem. A ancoragem define quanto do espaço criado pela extração será usado pela retração anterior e quanto pelo avanço dos posteriores. Esta decisão precisa estar no plano de tratamento escrito antes de iniciar.</p>
      <table class="data-table"><tr><th>Grau</th><th>Definição</th><th>Distribuição do espaço</th><th>Recurso</th></tr>
      <tr><td>Máxima</td><td>Nenhum avanço dos molares. 100% do espaço para retração anterior</td><td>Retração: 100% / Avanço molar: 0%</td><td>Mini-implante entre 2° PM e 1° M superior e/ou inferior. BTP reforçada</td></tr>
      <tr><td>Moderada</td><td>Avanço molar controlado. Distribuição equilibrada do espaço</td><td>Retração: 50–75% / Avanço molar: 25–50%</td><td>BTP convencional. Nance palatino. Arco extraoral moderado</td></tr>
      <tr><td>Mínima</td><td>Avanço molar permitido. Espaço principalmente usado pelo posterior</td><td>Retração: 25% / Avanço molar: 75%</td><td>Sem reforço de ancoragem. Apenas a mecânica de fechamento</td></tr>
      </table>
      <div class="alert-box"><div class="alert-label">Regra de ancoragem</div><p>Em casos de apinhamento severo com biprotrusão, ancoragem MÁXIMA é obrigatória. Cada milímetro de avanço molar é 1mm de retração anterior a menos — e em biprotrusos severos, essa perda pode comprometer completamente o resultado estético e funcional esperado.</p></div>
      <p><strong>Mini-implante como Ancoragem: Onde Instalar e Como Ativar</strong></p>
      <table class="data-table"><tr><th>Posição</th><th>Local</th><th>Indicação</th></tr>
      <tr><td>Palatino anterior (entre PM2 e M1 superior)</td><td>Entre as raízes do 2° PM e do 1° M superiores, na região palatina — cortical densa e baixo risco radicular</td><td>Ancoragem máxima na retração anterior superior. O mais usado. Alta estabilidade</td></tr>
      <tr><td>Palatino mediano (para MARPE)</td><td>Linha média palatina, 2 anteriores e 2 posteriores ao parafuso expansor</td><td>Expansão maxilar em adultos (MARPE). Não é para ancoragem de retração</td></tr>
      <tr><td>Infrazigomático (IZC)</td><td>Cortical óssea lateral da maxila, distal e acima do 1° M superior</td><td>Intrusão de molar superior ou ancoragem para mecânica de Classe II/III</td></tr>
      <tr><td>Buccal Shelf (mandibular)</td><td>Cortical óssea lateral da mandíbula, mesial ao 1° M inferior</td><td>Ancoragem máxima inferior. Permite retração dos II sem perda molar</td></tr>
      </table>
      <p><strong>Mecânica de Fechamento de Espaço: Alça vs Deslizamento</strong></p>
      <p>Após definir o dente extraído e a ancoragem, a mecânica de fechamento determina como o espaço será fechado. As duas opções principais têm vantagens distintas e indicações específicas.</p>
      <table class="data-table"><tr><th>Mecânica</th><th>Como funciona</th><th>Vantagem</th><th>Limitação</th></tr>
      <tr><td>Deslizamento (sliding)</td><td>Cadeia elastomérica ou mola de fechamento no arco. Dentes deslizam no fio</td><td>Simples. Menos consultas para ativar. Compatível com mini-implante</td><td>Atrito alto no slot. Torque não controlado no segmento anterior</td></tr>
      <tr><td>Alça de fechamento (loop)</td><td>Alça de T, L ou vertical no arco. Força intrínseca no fio</td><td>Controle 3D superior. Melhor controle de torque. Sem atrito de slot</td><td>Técnica sensível. Mais consultas. Requer arco 0.019"×0.025"</td></tr>
      </table>
      <p><strong>Monitoramento obrigatório durante o fechamento:</strong> periapical dos incisivos superiores e inferiores a cada 6 meses de retração · medir o espaço residual bilateral com régua periodontal em toda consulta · conferir que o molar não mesializou — comparar com fotos anteriores · verificar inclinação do incisivo: torque deve ser mantido, não apenas a inclinação · IMPA a cada 6 meses se houver retração inferior — limite biológico é 90°±5°.</p>

    {titulo:'O Raciocínio em 5 Passos', corpo:`
      <p>Percorra estes 5 passos nesta ordem. Cada resposta define o próximo. Nenhum pode ser pulado.</p>
      <p><strong>Passo 1 — Qual é a magnitude e a origem do apinhamento?</strong></p>
      <p>Faça a análise de modelo antes de abrir o cefalograma: medir CA e MD com fio de cobre e paquímetro — não estimar visualmente. &lt;4mm: leve → IPR + alinhamento direto. 4–8mm: moderado a severo → aplicar os 6 critérios. &gt;8mm: severo → extração quase sempre necessária. Calcular o Irregularity Index de Little nos incisivos inferiores. Fazer a análise de Bolton anterior e total. Esta resposta define o ponto de partida — sem ela, os próximos passos não têm base.</p>
      <p><strong>Passo 2 — Extrair ou não extrair?</strong></p>
      <p>Aplicar os 6 critérios diagnósticos: IMPA &lt;88° → margem para não extrair; &gt;95° → extração inferior indicada. Perfil convexo → extração melhora; reto/côncavo → não extrair. Padrão esquelético Classe II → extração superior "mata dois coelhos". Biotipo periodontal fino → maior cuidado com expansão. Discrepância &gt;10mm → extração obrigatória independente dos demais critérios. Borderline → setup digital + decisão compartilhada com o paciente informado. Esta é a decisão irreversível — tome com critério escrito, não com impressão visual.</p>
      <p><strong>Passo 3 — Se não extrair: qual estratégia?</strong></p>
      <p>Definir conforme a causa e a disponibilidade óssea: discrepância &lt;4mm + IMPA normal → IPR é suficiente. Atresia maxilar + crescimento ativo (CVM 1–3) → ERM/Hyrax. Atresia maxilar + adulto jovem (sutura parcialmente fusionada) → MARPE. Atresia maxilar + adulto maduro (sutura fusionada) → SARPE. Expansão dentoalveolar isolada apenas se biotipo espesso e CBCT confirmar osso vestibular. Combinar estratégias (ERM + IPR) pode resolver até 7–8mm em crescimento. O ganho de cada estratégia tem um teto biológico real — não planeje além dele.</p>
      <p><strong>Passo 4 — Se extrair: qual dente, qual ancoragem?</strong></p>
      <p>Definir antes de colar o primeiro braquete: Classe I + biprotrusão → 4 PM (2 sup + 2 inf) com ancoragem máxima. Classe I + apinhamento isolado → 2 PM superiores se inferior não apinhado. Classe II + apinhamento → 2 PM superiores, a extração resolve os dois problemas. IMPA &gt;93° + apinhamento inferior → 2 PM inferiores. Ancoragem máxima: mini-implante palatino entre 2º PM e 1º M superiores. Documentar o plano de ancoragem no prontuário antes de iniciar. Ancoragem definida errada = espaço perdido = resultado comprometido.</p>
      <p><strong>Passo 5 — Qual é a mecânica e o plano de contenção?</strong></p>
      <p>Planejar antes de instalar: deslizamento com mini-implante — menor atrito, maior controle de ancoragem. Alças de fechamento — maior controle de torque, exige habilidade técnica. Periapicais a cada 6 meses durante a retração. IMPA monitorado no cefalograma intermediário (6 e 12 meses). Contenção: fio 3×3 fixo inferior PERMANENTE + Essix ou Hawley superior noturno. Apinhamento terciário tem alta recidiva — contenção ativa e monitorada.</p>
      <div class="rule-box"><div class="rule-label">Regra final</div><p>A contenção começa no planejamento — não depois de remover o aparelho.</p></div>

    {titulo:'Mordida Profunda: A Maloclusão que Exige o Diagnóstico Correto Antes da Mecânica', corpo:`
      <p>A mordida profunda anterior (MPA) é definida como o trespasse vertical (overbite) dos incisivos superiores sobre os inferiores superior a 3 a 4mm, ou quando os incisivos inferiores tocam o palato ou a gengiva palatina dos superiores. Está presente em aproximadamente 20% dos pacientes que buscam tratamento ortodôntico — tornando-se uma das maloclusões mais comuns na prática clínica.</p>
      <p>O erro mais frequente no tratamento da mordida profunda não é a mecânica: é o diagnóstico. Escolher entre intruir incisivos, extruir molares ou combinar as duas estratégias depende de uma única pergunta respondida antes de qualquer outra decisão: o que está causando esta mordida profunda?</p>
      <p><strong>Classificação por Origem — Dentária vs Esquelética</strong></p>

      <div class="rule-box"><div class="rule-label">Regra clínica fundamental</div><p>A escolha entre intruir os incisivos e extruir os molares depende da exposição incisal em repouso e no sorriso. Se o paciente já mostra os incisivos superiores em quantidade adequada (2–4mm em repouso) ou tem sorriso gengival: intruir os IS é contraindicado — vai reduzir a exposição incisal e envelhecer o sorriso. Neste caso: extruir os molares é o caminho. Se a exposição incisal está aumentada (&gt;4mm) ou há sorriso gengival: intruir os IS é correto.</p></div>

      <div class="alert-box"><div class="alert-label">Mordida profunda severa — levante antes do fixo</div><p>Quando o overbite é &gt;7mm ou os incisivos inferiores tocam o palato: instalar levante de mordida anterior (bite plate) antes de colar o aparelho fixo inferior. Sem o levante, os braquetes inferiores ficam em oclusão com os IS superiores — os braquetes serão descolados repetidamente e o tratamento será impossível de executar.</p></div>

    {titulo:'Etiologia: O Que Criou Esta Mordida Profunda?', corpo:`
      <p>Não existe protocolo universal para mordida profunda. O protocolo correto depende da etiologia. Um paciente braquifacial esquelético severo e um paciente com curva de Spee exagerada e FMA normal têm o mesmo overbite aumentado — mas precisam de mecânicas completamente diferentes.</p>
      <p><strong>Fator 1 — Padrão de Crescimento Horizontal (Braquifacial)</strong></p>
      <p>O crescimento horizontal excessivo da mandíbula produz rotação anti-horária: o mento se projeta, o plano mandibular se horizontaliza, a dimensão vertical diminui e os molares não irrompem o suficiente para compensar. O resultado: a mandíbula "sobe" e os incisivos se supravertam.</p>

      <tr><td>Curva de Spee</td><td>Acentuada &gt;3mm</td><td>Reflexo da divergência hipodivergente</td></tr>
      <tr><td>Altura dentoalveolar posterior</td><td>Reduzida</td><td>Molares subvertidos — a raiz do problema</td></tr>
      </table>
      <p><strong>Fator 2 — Supraversão Dentoalveolar dos Incisivos</strong></p>
      <p>A supraversão dos incisivos superiores e/ou inferiores é a causa dentária mais comum da mordida profunda. Os incisivos irrompem além do plano oclusal — geralmente associados a ausência de contato posterior adequado na infância ou a hábitos que favoreceram a irrupção anterior excessiva.</p>
      <p>Reconhecimento clínico: incisivos cobrem excessivamente, mas a altura facial total é normal (FMA 22–28°). Cefalometricamente: altura dentoalveolar anterior aumentada com altura dentoalveolar posterior normal. Terapêutica: intrusão verdadeira dos incisivos — o caminho mais eficaz quando a exposição incisal permite.</p>
      <p><strong>Fator 3 — Curva de Spee Exagerada</strong></p>
      <p>A curva de Spee é a curvatura anteroposterior do arco dentário inferior medida dos incisivos ao 2° molar. Normal: 0 a 2mm. Exagerada: &gt;3mm. Uma curva de Spee acentuada contribui com 0,5mm de overbite para cada 1mm de curva — e seu nivelamento é obrigatório no tratamento da MP.</p>
      <p>Nivelamento da curva de Spee: arco com curva reversa no inferior (reverse curve of Spee) ou utility arch. A cada 1mm de nivelamento da curva de Spee: ≈0,5mm de ganho de overbite. Importante: nivelar a curva de Spee extrui os molares — cuidado com o padrão vertical do paciente.</p>
      <p><strong>Fator 4 — Classe II Divisão 2</strong></p>
      <p>A Classe II Divisão 2 é a maloclusão que mais frequentemente se associa à mordida profunda severa. Os incisivos superiores estão retroinclinados (1-NA diminuído), os laterais vestibularizados e o overbite pode ser extremo (&gt;8mm). A biomecânica específica desta combinação exige vestibularização dos IS antes da intrusão — nunca o contrário.</p>

      <tr><td>Incisivos centrais superiores</td><td>Vestibularizados (1-NA &gt;26°)</td><td>Retroinclinados (1-NA &lt;18°) — sinal patognomônico</td></tr>

    {titulo:'Mecânica por Protocolo: Da Indicação à Execução', corpo:`
      <p>Os protocolos de correção da mordida profunda têm evidências bem documentadas na literatura. A escolha entre eles depende do diagnóstico diferencial, do grau de mordida profunda, do padrão vertical e da fase de crescimento. Cada protocolo tem um mecanismo específico, um limite de correção esperado e um plano de contenção próprio.</p>
      <p><strong>Protocolo A — Levante de Mordida Anterior (Bite Plate)</strong></p>
      <p>O levante de mordida anterior é o primeiro aparelho a ser usado nos casos de mordida profunda severa. Não corrige a mordida profunda diretamente — libera o segmento posterior para irromper e cria o espaço necessário para instalar o aparelho fixo inferior sem risco de trauma nos braquetes.</p>
      <table class="data-table"><tr><th>Parâmetro</th><th>Detalhe clínico</th></tr>
      <tr><td>Indicação principal</td><td>Overbite &gt;6mm ou incisivos inferiores tocando o palato. Instalar antes do aparelho fixo inferior</td></tr>
      <tr><td>Mecanismo</td><td>Os IS superiores tocam a placa anterior e liberam os dentes posteriores inferiores de qualquer contato. Os molares irrompem livremente — extrusão passiva por desoclusão posterior</td></tr>
      <tr><td>Tipo de levante</td><td>Fixo (colado nos IS superiores) ou removível (Hawley com plano anterior). O fixo tem maior eficácia por ser 24 horas</td></tr>

      <tr><td>Cuidado</td><td>Monitorar padrão vertical: extrusão de molares é bem-vinda no braquifacial, mas perigosa no hiperdivergente. Contraindicado no hiperdivergente</td></tr>
      </table>
      <p><strong>Protocolo B — Curva Reversa e Utility Arch (MP Dentária em Crescimento)</strong></p>
      <p>Para mordida profunda dentária em pacientes em crescimento, a mecânica de curva reversa no arco inferior é a mais simples e eficaz. Nivela a curva de Spee por combinação de intrusão anterior e extrusão posterior.</p>
      <table class="data-table"><tr><th>Mecânica</th><th>Mecanismo</th><th>Indicação</th><th>Limitação</th></tr>
      <tr><td>Curva reversa no arco inferior</td><td>Arco retangular com curva reversa: extrui os molares e intrui os incisivos</td><td>MP dentária leve a moderada (3–6mm). Curva de Spee acentuada</td><td>Não é intrusão verdadeira — é principalmente extrusão posterior. Instável em adultos</td></tr>
      <tr><td>Utility Arch (Ricketts)</td><td>Arco duplo: segmento anterior 0.016" e posterior 0.036". Intrusão verdadeira dos incisivos</td><td>MP dentária moderada. Crescimento ativo (CVM 1–4). Associado ao fixo</td><td>Técnica sensível. Requer experiência em dobras 3D. Braquetes Edgewise no posterior</td></tr>
      <tr><td>Arco de intrusão de Burstone</td><td>Arco segmentado: força de intrusão pura no anterior sem efeito nos posteriores</td><td>MP moderada a severa. Intrusão verdadeira dos IS ou II. Qualquer idade</td><td>Requer ancoragem posterior firme. Técnica avançada. Arco base 0.019"×0.025"</td></tr>
      </table>
      <div class="alert-box"><div class="alert-label">Diferença entre intrusão verdadeira e nivelamento</div><p>A curva reversa não produz intrusão verdadeira dos incisivos — ela nivela a curva de Spee principalmente por extrusão dos molares. Isso é adequado no crescimento e no braquifacial. No adulto e nos casos onde a exposição incisal já está adequada: use o arco de intrusão de Burstone ou mini-implantes para intrusão verdadeira sem efeito extrusivo nos posteriores.</p></div>
      <p><strong>Protocolo C — Intrusão de Incisivos com Mini-implantes (Padrão-ouro no Adulto)</strong></p>
      <p>A intrusão de incisivos via mini-implantes é o protocolo de maior evidência científica para correção da mordida profunda dentária em adultos. Revisão sistemática (Bardideh et al., Biomimetics, 2023) confirmou média de 2,6mm de intrusão verdadeira com mini-implantes vs 1,8mm com arcos convencionais — com maior estabilidade em 5 anos.</p>

      <tr><td>Força de intrusão</td><td>60 a 100g por lado. Cadeia elastomérica leve ou mola de NiTi. Forças leves e contínuas são superiores às pesadas e intermitentes</td></tr>
      <tr><td>Arco de trabalho</td><td>0.019"×0.025" aço passivo como arco base. Mini-implante conectado ao arco — não ao braquete individual</td></tr>
      <tr><td>Intrusão esperada</td><td>Média de 2 a 3mm em 6 a 9 meses com ancoragem esquelética. Sobrecorrigir 1mm para compensar recidiva esperada de 10 a 20%</td></tr>
      <tr><td>Risco de reabsorção</td><td>Periapical dos IS e II a cada 6 meses durante a intrusão. Intrusão de IS retroinclinados: alto risco. Vestibularizar antes</td></tr>
      </table>
      <div class="rule-box"><div class="rule-label">Estabilidade da intrusão com mini-implantes</div><p>Estudo de longo prazo (AJODO, 2023) documentou recidiva média de 0,8mm após 5 anos com intrusão via mini-implante, versus 1,4mm com utility arch. A recidiva é menor quando: (1) o fator etiológico foi eliminado; (2) a contenção com fio 3×3 fixo foi mantida; (3) foi sobrecorrigido 1mm.</p></div>
      <p><strong>Protocolo D — Extrusão de Molares com Ancoragem Esquelética</strong></p>
      <p>Para correção da mordida profunda esquelética no adulto, a extrusão de molares via ancoragem esquelética é o protocolo mais indicado. A extrusão passiva pelo levante de mordida é insuficiente no adulto — a força ativa com mini-implantes posteriores é necessária.</p>

      <tr><td>Mini-implantes para extrusão</td><td>IZC (infrazigomático) ou entre 2° PM e 1° M superiores. Conexão ao arco ou diretamente ao molar — força extrusiva ativa</td></tr>

      <tr><td>Risco</td><td>Extrusão de molar no hiperdivergente: rotação mandibular horária → abre mordida anterior → agrava perfil. NUNCA usar em FMA &gt;28°</td></tr>
      </table>
      <p><strong>Protocolo E — Classe II Divisão 2 com Mordida Profunda: Sequência Obrigatória</strong></p>
      <p>A Classe II Divisão 2 com mordida profunda severa é o caso mais complexo desta maloclusão. A sequência de tratamento é fixa e não pode ser invertida.</p>

      <tr><td>5 — Corrigir a Classe II sagital</td><td>Elásticos Cl II, Forsus ou extração de 2 PM superiores conforme indicado</td><td>Corrigir sagital só após o overbite estar controlado</td></tr>
      </table>

    {titulo:'O Raciocínio em 5 Passos', corpo:`
      <p>Percorra estes 5 passos nesta ordem, sem pular nenhum, antes de abrir a ficha de planejamento.</p>
      <p><strong>Passo 1 — Qual é a magnitude e o tipo?</strong></p>
      <p>Meça o overbite com paquímetro e classifique: overbite 1–3mm → normal, não tratar especificamente. 3–5mm leve / 5–7mm moderada / &gt;7mm severa — define a urgência. Dentária (FMA normal + supraversão dos IS) → caminho 1 ou 3. Esquelética (FMA &lt;20° + molares subvertidos) → caminho 2. Mista → combinação dos caminhos conforme proporção. Cl II Divisão 2? → Protocolo E, com sequência fixa e obrigatória. Sem a medida precisa e a classificação, qualquer escolha mecânica é aleatória.</p>
      <p><strong>Passo 2 — Qual é a exposição incisal?</strong></p>
      <p>Meça a exposição dos IS em repouso e avalie o sorriso: &lt;2mm ou sem exposição → NÃO intruir IS, extruir molares. 2–4mm → zona neutra, decidir pelo FMA e pela causa. &gt;4mm ou sorriso gengival → intruir IS, indicação correta. Paciente idoso (&gt;50 anos) → a exposição reduz com a idade, cuidado com intrusão. Intruir IS em paciente com exposição normal ou reduzida é erro estético grave.</p>
      <p><strong>Passo 3 — Qual é o padrão vertical?</strong></p>
      <p>FMA + SN.GoGn + AFAI: FMA &lt;20° → braquifacial, levante de mordida + extrusão de molares favorável. FMA 20–28° → normodivergente, qualquer protocolo pode ser usado. FMA &gt;28° → hiperdivergente, qualquer extrusão molar é perigosa. Hiperdivergente com MP: o overbite é uma proteção relativa — corrigir com extremo cuidado para não converter em mordida aberta. O padrão vertical define o que é permitido e o que é contraindicado.</p>
      <p><strong>Passo 4 — O paciente está em crescimento?</strong></p>
      <p>CVM + altura facial total: CVM 1–3 → extrusão de molar via levante de mordida tem resposta máxima. CVM 4–5 → crescimento residual, bite plate ainda eficaz. CVM 6 / adulto → extrusão passiva não funciona, usar extrusão ativa com mini-implantes ou intrusão via mini-implantes. Adulto braquifacial severo → cirurgia ortognática frequentemente é a solução mais estável para casos acima de 8mm. No crescimento a janela de correção esquelética existe; no adulto é mecânica pura.</p>
      <p><strong>Passo 5 — Qual é o plano de contenção?</strong></p>
      <p>Definir antes de instalar: MP dentária por supraversão → fio 3×3 fixo anterior (superior + inferior) obrigatório. Curva de Spee nivelada → a contenção deve manter o nivelamento, arco de contenção inferior ativo por 12 a 18 meses. MP esquelética → contenção longa, bite plate noturno por 12 a 18 meses após a remoção do aparelho. Cl II Divisão 2 → fio 3×3 fixo superior obrigatório, a retroinclinação dos IS é tendência permanente de recidiva. Fonoaudiologia: avaliar postura lingual e deglutição — pressão lingual pode manter ou recidivar a MP dentária.</p>
      <div class="rule-box"><div class="rule-label">Regra final</div><p>A contenção da MP é longa, ativa e monitorada. Nunca passiva e genérica.</p></div>
    `}

/* localStorage load */
try{
  const saved = localStorage.getItem('orthopath_fichas');
  if(saved) fichaData = JSON.parse(saved);
}catch(e){}

function saveToStorage(){
  try{ localStorage.setItem('orthopath_fichas', JSON.stringify(fichaData)); }catch(e){}
}

function getFV(pid, fid){
  return (fichaData[pid] && fichaData[pid][fid] !== undefined) ? fichaData[pid][fid] : '';
}
function setFV(pid, fid, val){
  if(!fichaData[pid]) fichaData[pid] = {};
  fichaData[pid][fid] = val;
}

function render(){
  const app = document.getElementById('app');
  if(currentView === 'welcome'){
    app.innerHTML = renderWelcome();
  } else if(currentView === 'home'){
    app.innerHTML = renderHome();
  } else if(currentView === 'favoritos'){
    app.innerHTML = renderFavoritos();
  } else if(currentView === 'fichaUniversal'){
    app.innerHTML = renderFichaUniversalView();
  } else {
    app.innerHTML = renderProtocol(currentProtocolId);
  }
  attachEvents();
  window.scrollTo(0,0);
}

function protocolInitials(nome){
  return nome.split(' ').filter(w => w.length > 1 || /[A-ZÀ-Ú]/.test(w)).slice(0,2).map(w => w[0]).join('').toUpperCase().slice(0,3);
}

      <div class="eyebrow">Protocolo ${p.num}</div>
      <h1>${p.nome}</h1>
      <p class="sub">${p.subtitulo}</p>
    </div>
    <div class="tabs">
      <button class="tab-btn ${currentTab==='conteudo'?'active':''}" data-tab="conteudo">Conteúdo</button>
      <button class="tab-btn ${currentTab==='ficha'?'active':''}" data-tab="ficha">Ficha Clínica</button>
    </div>
    ${currentTab === 'conteudo' ? renderConteudo(p) : renderFicha(p)}
  `;
}

function renderConteudo(p){
  let html = '<div class="content-view">';
  p.conteudo.forEach((sec, i) => {
    const key = p.id+'-c-'+i;
    const isOpen = !!openAcc[key];
    html += `
      <div class="acc-item ${isOpen?'open':''}" data-acckey="${key}">
        <div class="acc-head">
          <h3>${sec.titulo}</h3>
          <div class="chev">▾</div>
        </div>
        <div class="acc-body"><div class="acc-body-inner">${sec.corpo}</div></div>
      </div>
    `;
  });
  // armadilhas
  const keyArm = p.id+'-armadilhas';
  const openArm = !!openAcc[keyArm];
  html += `
    <div class="acc-item ${openArm?'open':''}" data-acckey="${keyArm}">
      <div class="acc-head"><h3>As 5 Armadilhas Clínicas</h3><div class="chev">▾</div></div>
      <div class="acc-body"><div class="acc-body-inner">
        ${p.armadilhas.map((a,i)=>`
          <div class="trap-card">
            <div class="trap-num">Armadilha ${String(i+1).padStart(2,'0')}</div>
            <h4>${a.titulo}</h4>
            <div class="lbl">O que acontece</div><p>${a.acontece}</p>
            <div class="lbl">Como evitar</div><p>${a.evitar}</p>
          </div>
        `).join('')}
      </div></div>
    </div>
  `;
  // checklist
  const keyChk = p.id+'-checklist';
  const openChk = !!openAcc[keyChk];
  html += `
    <div class="acc-item ${openChk?'open':''}" data-acckey="${keyChk}">
      <div class="acc-head"><h3>Checklist de Exames</h3><div class="chev">▾</div></div>
      <div class="acc-body"><div class="acc-body-inner">
        ${Object.entries(p.checklist).map(([grupo, itens])=>`
          <div class="checklist-group">
            <h4>${grupo}</h4>
            ${itens.map(it=>`<div class="check-line">${it}</div>`).join('')}
          </div>
        `).join('')}
      </div></div>
    </div>
  `;
  html += '</div>';
  return html;
}

function renderFieldGeneric(pid, f){
  const val = getFV(pid, f.id);
  if(f.type === 'text'){
    return `<div class="field-row"><label>${f.label}</label><input type="text" data-fid="${f.id}" value="${(val||'').replace(/"/g,'&quot;')}"></div>`;
  }
  if(f.type === 'textarea'){
    return `<div class="field-row"><label>${f.label}</label><textarea data-fid="${f.id}">${val||''}</textarea></div>`;
  }
  if(f.type === 'radio'){
    return `<div class="field-row"><label>${f.label}</label>
      <div class="option-group" data-fid="${f.id}">
        ${f.options.map(o=>`<button type="button" class="opt-pill ${val===o?'selected':''}" data-val="${o}">${o}</button>`).join('')}
      </div>
    </div>`;
  }
  if(f.type === 'multi'){
    const selected = val ? val.split('|') : [];
    return `<div class="field-row"><label>${f.label}</label>
      <div class="option-group" data-fid="${f.id}" data-multi="1">
        ${f.options.map(o=>`<button type="button" class="opt-pill ${selected.includes(o)?'selected':''}" data-val="${o}">${o}</button>`).join('')}
      </div>
    </div>`;
  }
  return '';
}

function renderFicha(p){
  let html = '<div class="ficha-view"><div class="ficha-block">';
  html += `<div class="ficha-block-title"><div class="ficha-block-num">1</div><h3>Identificação</h3></div>`;
  p.ficha.identificacao.forEach(f => { html += renderFieldGeneric(p.id, f); });
  html += '</div>';

  p.ficha.blocos.forEach((bloco, idx) => {
    html += `<div class="ficha-block"><div class="ficha-block-title"><div class="ficha-block-num">${idx+2}</div><h3>${bloco.titulo}</h3></div>`;
    if(bloco.tabela){
      html += `<table class="ficha-table"><tr><th>Grandeza</th><th>Norma</th><th>Valor</th></tr>`;
      bloco.tabela.forEach(row=>{
        const fid = 'tab_'+bloco.titulo.replace(/[^a-zA-Z0-9]/g,'')+'_'+row.nome.replace(/[^a-zA-Z0-9]/g,'');
        const val = getFV(p.id, fid);
        html += `<tr><td class="g-name">${row.nome}</td><td class="g-norm">${row.norma}</td><td><input type="text" data-fid="${fid}" value="${(val||'').replace(/"/g,'&quot;')}"></td></tr>`;
      });
      html += `</table>`;
      if(bloco.camposExtra){ bloco.camposExtra.forEach(f=>{ html += renderFieldGeneric(p.id, f); }); }
    }
    if(bloco.campos){
      bloco.campos.forEach(f => { html += renderFieldGeneric(p.id, f); });
    }
    html += '</div>';
  });

  // alertas
  html += `<div class="ficha-block"><div class="ficha-block-title"><div class="ficha-block-num">!</div><h3>Alertas e Fatores de Risco</h3></div>`;
  p.ficha.alertas.forEach((a, i) => {
    const fid = 'alerta_'+i;
    const checked = getFV(p.id, fid) === true;
    html += `<div class="alert-check ${checked?'checked':''}" data-fid="${fid}"><div class="box">${checked?'✓':''}</div><span class="txt">${a}</span></div>`;
  });
  html += '</div>';

  html += `
    <div class="ficha-toolbar">
      <button class="btn btn-ghost" id="printBtn">Imprimir / PDF</button>
      <button class="btn btn-primary" id="clearBtn">Limpar Ficha</button>
    </div>
    <div class="save-msg" id="saveMsg"></div>
  `;
  html += '</div>';
  return html;
}

/* ============================================================
   FICHA CLÍNICA UNIVERSAL — view dedicada (sem tabs)
   ============================================================ */
function renderFichaUniversalView(){
  const F = FICHA_UNIVERSAL;
  let html = `
    <div class="topbar" id="topbar">
      <button class="back-btn" id="backBtn">‹</button>
      <div class="brand-mini">Ortho<b>Path</b></div>
    </div>
    <div class="protocol-header">
      <div class="eyebrow">Ficha Universal</div>
      <h1>${F.nome}</h1>
      <p class="sub">${F.subtitulo}</p>
      <p style="font-size:13px;color:var(--gold-soft);margin-top:10px;letter-spacing:0.02em;font-weight:500;">${F.legenda}</p>
    </div>
    <div class="ficha-view">
  `;

  F.blocos.forEach((bloco, idx) => {
    html += `<div class="ficha-block"><div class="ficha-block-title"><div class="ficha-block-num">${idx+1}</div><h3>${bloco.titulo.replace(/^\d+\s*·\s*/,'')}</h3></div>`;

    if(bloco.tabelaSupInf){
      html += `<table class="ficha-table"><tr><th>Medida</th><th>Superior</th><th>Inferior</th></tr>`;
      bloco.tabelaSupInf.forEach(row=>{
        const valSup = getFV('fichaUniversal', row.supId);
        const valInf = getFV('fichaUniversal', row.infId);
        html += `<tr>
          <td class="g-name">${row.label}<br><span style="font-size:12px;color:var(--gold-soft);font-weight:500;">${row.ref}</span></td>
          <td><input type="text" data-fid="${row.supId}" value="${(valSup||'').replace(/"/g,'&quot;')}"></td>
          <td><input type="text" data-fid="${row.infId}" value="${(valInf||'').replace(/"/g,'&quot;')}"></td>
        </tr>`;
      });
      html += `</table>`;
    }

    if(bloco.tabela){
      html += `<table class="ficha-table"><tr><th>Grandeza</th><th>Norma</th><th>Valor</th></tr>`;
      bloco.tabela.forEach(row=>{
        const fid = 'cef_'+row.nome.replace(/[^a-zA-Z0-9]/g,'');
        const val = getFV('fichaUniversal', fid);
        html += `<tr><td class="g-name">${row.nome}<br><span style="font-size:12px;color:var(--gold-soft);font-weight:500;">${row.interp}</span></td><td class="g-norm">${row.norma}</td><td><input type="text" data-fid="${fid}" value="${(val||'').replace(/"/g,'&quot;')}"></td></tr>`;
      });
      html += `</table>`;
    }

    if(bloco.campos){
      bloco.campos.forEach(f => { html += renderFieldGeneric('fichaUniversal', f); });
    }

    if(bloco.nota){
      html += `<p style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13.5px;color:var(--gold-soft);margin-top:10px;line-height:1.55;border-top:1px dashed rgba(224,184,79,0.25);padding-top:10px;font-weight:500;">${bloco.nota}</p>`;
    }

    html += '</div>';
  });

  html += `
    <div class="ficha-toolbar">
      <button class="btn btn-ghost" id="printBtn">Imprimir / PDF</button>
      <button class="btn btn-primary" id="clearBtn">Limpar Ficha</button>
    </div>
    <div class="save-msg" id="saveMsg"></div>
  `;
  html += '</div>';
  return html;
}


function attachEvents(){
  const topbar = document.getElementById('topbar');
  if(topbar){
    window.onscroll = () => {
      if(window.scrollY > 10) topbar.classList.add('scrolled');
      else topbar.classList.remove('scrolled');
    };
  }

  const accessBtn = document.getElementById('accessBtn');
  if(accessBtn){
    accessBtn.addEventListener('click', ()=>{
      currentView = 'home';
      render();
    });
  }

  const bellBtn = document.getElementById('bellBtn');
  if(bellBtn){
    bellBtn.addEventListener('click', ()=>{
      alert('Sem novas notificações.');
    });
  }

  document.querySelectorAll('.nav-item').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const nav = btn.getAttribute('data-nav');
      if(nav === 'inicio'){ currentView = 'welcome'; render(); }
      else if(nav === 'protocolos'){ currentView = 'home'; render(); }
      else if(nav === 'favoritos'){ currentView = 'favoritos'; render(); }
    });
  });

  document.querySelectorAll('.protocol-card').forEach(card=>{
    card.addEventListener('click', ()=>{
      if(card.getAttribute('data-fichauniversal')){
        currentProtocolId = 'fichaUniversal';
        cameFromView = currentView === 'favoritos' ? 'favoritos' : 'home';
        currentView = 'fichaUniversal';
        render();
        return;
      }
      currentProtocolId = card.getAttribute('data-id');
      cameFromView = 'home';
      currentView = 'protocol';
      currentTab = 'conteudo';
      render();
    });
  });

  const backBtn = document.getElementById('backBtn');
  if(backBtn){
    backBtn.addEventListener('click', ()=>{
      currentView = cameFromView || 'home';
      render();
    });
  }

  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      currentTab = btn.getAttribute('data-tab');
      render();
    });
  });

  document.querySelectorAll('.acc-head').forEach(head=>{
    head.addEventListener('click', ()=>{
      const item = head.parentElement;
      const key = item.getAttribute('data-acckey');
      openAcc[key] = !openAcc[key];
      item.classList.toggle('open');
    });
  });

  // ficha inputs
  document.querySelectorAll('.field-row input[type=text], .field-row textarea, table.ficha-table input').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      setFV(currentProtocolId, inp.getAttribute('data-fid'), inp.value);
      saveToStorage();
      flashSaved();
    });
  });

  document.querySelectorAll('.option-group').forEach(group=>{
    const fid = group.getAttribute('data-fid');
    const isMulti = group.getAttribute('data-multi') === '1';
    group.querySelectorAll('.opt-pill').forEach(pill=>{
      pill.addEventListener('click', ()=>{
        const val = pill.getAttribute('data-val');
        if(isMulti){
          const current = getFV(currentProtocolId, fid);
          let arr = current ? current.split('|') : [];
          if(arr.includes(val)) arr = arr.filter(v=>v!==val);
          else arr.push(val);
          setFV(currentProtocolId, fid, arr.join('|'));
          pill.classList.toggle('selected');
        } else {
          const current = getFV(currentProtocolId, fid);
          const newVal = current === val ? '' : val;
          setFV(currentProtocolId, fid, newVal);
          group.querySelectorAll('.opt-pill').forEach(p=>p.classList.remove('selected'));
          if(newVal) pill.classList.add('selected');
        }
        saveToStorage();
        flashSaved();
      });
    });
  });

  document.querySelectorAll('.alert-check').forEach(ac=>{
    ac.addEventListener('click', ()=>{
      const fid = ac.getAttribute('data-fid');
      const current = getFV(currentProtocolId, fid) === true;
      setFV(currentProtocolId, fid, !current);
      ac.classList.toggle('checked');
      ac.querySelector('.box').textContent = !current ? '✓' : '';
      saveToStorage();
      flashSaved();
    });
  });

  const printBtn = document.getElementById('printBtn');
  if(printBtn) printBtn.addEventListener('click', ()=> window.print());

  const clearBtn = document.getElementById('clearBtn');
  if(clearBtn) clearBtn.addEventListener('click', ()=>{
    if(confirm('Limpar todos os dados desta ficha?')){
      fichaData[currentProtocolId] = {};
      saveToStorage();
      render();
    }
  });
}

let saveTimeout;
function flashSaved(){
  const msg = document.getElementById('saveMsg');
  if(!msg) return;
  msg.textContent = 'Salvo automaticamente ✓';
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(()=>{ if(msg) msg.textContent=''; }, 1500);
}

render();
</script>
